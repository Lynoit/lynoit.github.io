<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skröja Anslagstavla</title>
  <style>
    :root{
      --bg:#5c94fc;
      --bg2:#7cacf8;
      --screen:#f8f8f8;
      --panel:#d8d8d8;
      --panel2:#bcbcbc;
      --panel3:#9c9c9c;
      --line:#3c3c3c;
      --line2:#000000;
      --text:#202020;
      --text-light:#f8f8f8;
      --text-dim:#5c5c5c;
      --red:#d82800;
      --orange:#fca044;
      --yellow:#f8d878;
      --green:#58b858;
      --blue:#3c78d8;
      --cyan:#58d8d8;
      --shadow:8px 8px 0 rgba(0,0,0,.35);
      --soft:4px 4px 0 rgba(0,0,0,.22);
      --mono:"Courier New", monospace;
      --sans:"Trebuchet MS", Arial, sans-serif;
    }

    *{box-sizing:border-box}

    html, body{
      image-rendering:pixelated;
    }

    body{
      margin:0;
      min-height:100vh;
      padding:0;
      color:var(--text);
      font-family:var(--sans);
      background:
        linear-gradient(180deg, var(--bg2), var(--bg));
    }

    .frame{
      min-height:100vh;
      padding:16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.08));
    }

    .board{
      min-height:calc(100vh - 32px);
      padding:18px 18px 14px;
      position:relative;
      overflow:hidden;
      background:var(--screen);
      border:4px solid var(--line2);
      box-shadow:var(--shadow);
    }

    .board::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 31px,
          rgba(0,0,0,.03) 31px,
          rgba(0,0,0,.03) 32px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 31px,
          rgba(0,0,0,.03) 31px,
          rgba(0,0,0,.03) 32px
        );
      opacity:.45;
    }

    .top{
      display:grid;
      grid-template-columns:210px 1fr 200px;
      gap:18px;
      align-items:start;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }

    .pin-note,.qr-note{
      position:relative;
      background:var(--panel);
      border:4px solid var(--line2);
      box-shadow:var(--soft);
      overflow:hidden;
    }

    .pin-note::before,
    .qr-note::before,
    .name::before,
    .card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:6px;
      background:var(--red);
    }

    .pin-note::after,
    .qr-note::after,
    .name::after,
    .card::after{
      content:"";
      position:absolute;
      right:0;
      bottom:0;
      width:100%;
      height:4px;
      background:rgba(0,0,0,.18);
    }

    .pin-note{
      padding:12px;
      margin-top:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .pin-note button{
      width:100%;
      border:4px solid var(--line2);
      padding:12px 14px;
      background:var(--red);
      color:var(--text-light);
      font-family:var(--mono);
      font-size:1rem;
      font-weight:700;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow:4px 4px 0 rgba(0,0,0,.28);
    }

    .pin-note button:hover{
      filter:brightness(1.05);
    }

    .pin-note button:active{
      transform:translate(2px,2px);
      box-shadow:2px 2px 0 rgba(0,0,0,.28);
    }

    .status{
      display:none;
    }

    .center{
      text-align:center;
      padding-top:2px;
      position:relative;
    }

    .logo-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:14px 18px;
      background:var(--panel);
      border:4px solid var(--line2);
      box-shadow:var(--soft);
    }

    .logo-wrap img{
      max-height:240px;
      width:auto;
      image-rendering:pixelated;
      filter:contrast(1.05) saturate(1.05);
    }

    .qr-note{
      padding:10px 10px 8px;
      margin-top:10px;
    }

    .qr-note .label{
      margin:0 0 8px;
      font-family:var(--mono);
      font-size:.85rem;
      font-weight:700;
      color:var(--line2);
      text-transform:uppercase;
      text-align:center;
    }

    #qrcode{
      width:154px;
      height:154px;
      margin:4px auto 8px;
      background:#fff;
      border:4px solid var(--line2);
      padding:7px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:4px 4px 0 rgba(0,0,0,.2);
    }

    #qrcode img{
      width:140px;
      height:140px;
      display:block;
      image-rendering:pixelated;
    }

    .rows{
      display:grid;
      gap:14px;
      position:relative;
      z-index:1;
      margin-top:2px;
    }

    .user-row{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:18px;
      align-items:center;
    }

    .name{
      justify-self:center;
      min-width:78px;
      padding:12px 10px 10px;
      text-align:center;
      font-size:.95rem;
      font-weight:700;
      color:var(--text-light);
      text-transform:uppercase;
      background:var(--blue);
      border:4px solid var(--line2);
      box-shadow:var(--soft);
      position:relative;
      font-family:var(--mono);
    }

    .lane{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      padding:10px;
      min-height:86px;
      border:4px solid var(--line2);
      box-shadow:var(--soft);
      position:relative;
      overflow:hidden;
    }

    .lane-blue{
      background:var(--cyan);
    }

    .lane-peach{
      background:var(--yellow);
    }

    .lane-green{
      background:#98e090;
    }

    .card{
      min-height:68px;
      padding:12px 10px 8px;
      position:relative;
      background:var(--screen);
      border:4px solid var(--line2);
      box-shadow:4px 4px 0 rgba(0,0,0,.18);
      display:grid;
      align-content:start;
      gap:6px;
      overflow:hidden;
    }

    .lane .card:nth-child(1),
    .lane .card:nth-child(2),
    .lane .card:nth-child(3){
      transform:none;
    }

    .title2{
      font-size:clamp(0.9rem, 1.1vw, 1rem);
      line-height:1.08;
      font-weight:700;
      color:var(--text);
      font-family:var(--mono);
      text-transform:uppercase;
      word-break:break-word;
    }

    .meta{
      font-family:var(--mono);
      font-size:.72rem;
      color:var(--text-dim);
    }

    .thumb{
      width:100%;
      aspect-ratio:4 / 1.7;
      object-fit:cover;
      border:4px solid var(--line2);
      background:#cfcfcf;
      margin-top:2px;
      image-rendering:pixelated;
    }

    .footer{
      margin-top:14px;
      text-align:center;
      font-family:var(--mono);
      font-size:.85rem;
      font-weight:700;
      color:var(--line2);
      text-transform:uppercase;
      position:relative;
      z-index:1;
      padding:10px 8px;
      background:var(--panel);
      border:4px solid var(--line2);
      box-shadow:var(--soft);
    }

    .featured-row{
      margin-bottom:54px;
    }

    .featured-name{
      font-size:1rem;
      padding:12px 10px 10px;
      background:var(--red);
    }

    .featured-lane .card{
      min-height:68px;
    }

    .featured-lane .title2{
      font-size:clamp(0.9rem, 1.1vw, 1.05rem);
    }

    .featured-lane .meta{
      font-size:0.74rem;
    }

    #night-screen{
      position:fixed;
      inset:0;
      background:#000;
      z-index:99999;
      display:none;
    }

    @media (max-width:1180px){
      .top{
        grid-template-columns:1fr;
        justify-items:center;
      }
      .pin-note,.qr-note{
        width:min(100%,420px);
      }
      .user-row{
        grid-template-columns:1fr;
      }
      .name{
        justify-self:start;
        margin-left:12px;
      }
    }

    @media (max-width:860px){
      .lane{
        grid-template-columns:1fr;
      }
      .card{
        transform:none !important;
      }
    }
  </style>
</head>
<body>
  <div id="night-screen"></div>
  <div class="frame">
    <div class="board">
      <div class="top">
        <div class="pin-note">
          <button id="fullscreen-btn">Helskärm</button>
          <div class="status" id="poll-status"></div>
        </div>

        <div class="center">
          <div class="logo-wrap">
            <img src="skroja-logo.png" alt="Skröja Lerverkstad">
          </div>
        </div>

        <div class="qr-note">
          <div class="label">QR-kod</div>
          <div id="qrcode"></div>
        </div>
      </div>

      <div class="rows" id="rows"></div>
      <div class="footer">Powered by Lynoit Tech</div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'Lerverkstan', laneClass: 'lane-blue', featured: true },
      { name: 'Camilla', laneClass: 'lane-green' },
      { name: 'Christina', laneClass: 'lane-peach' },
      { name: 'Maria', laneClass: 'lane-green' }
    ];

    const hiddenActivities = [
       'Checka in'
    ];

    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };

    const activityAppUrl = 'https://lynoit.github.io/SkrojaAktivitet.html';
    const pollIntervalMs = 15000;
    const rowsContainer = document.getElementById('rows');
    const pollStatus = document.getElementById('poll-status');

    const nightScreen = document.getElementById('night-screen');
    let pollTimer = null;

    let lastSeenLatestFile = null;
    let hasLoadedOnce = false;

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" referrerpolicy="no-referrer">`;
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
      }

      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);

      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob'));

      return blobNodes
        .map(blob => {
          const name = blob.querySelector('Name')?.textContent || '';
          const lastModified = blob.querySelector('Properties > Last-Modified')?.textContent || '';
          return { name, lastModified };
        })
        .filter(blob => blob.name.endsWith('.json'));
    }

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }

    function isNightMode() {
      const hour = new Date().getHours();
      return hour >= 1 && hour < 6;
    }

    function updateNightMode() {
      const night = isNightMode();
      nightScreen.style.display = night ? 'block' : 'none';
    }

    async function safeLoadActivities() {
      if (isNightMode()) {
        updateNightMode();
        return;
      }

      updateNightMode();

      try {
        await loadActivities();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);

      pollTimer = setInterval(() => {
        safeLoadActivities();
      }, pollIntervalMs);
    }

    async function loadActivities(force = false) {
      if (pollStatus) pollStatus.textContent = '';

      const files = await listJsonBlobs();
      const sortedFiles = files
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name))
        .reverse();

      const latestFile = sortedFiles[0]?.name || null;

      if (!force && hasLoadedOnce && latestFile === lastSeenLatestFile) {
        return;
      }

      lastSeenLatestFile = latestFile;
      hasLoadedOnce = true;

      const recentFiles = sortedFiles.slice(0, 20).map(file => file.name);
      const records = await Promise.all(recentFiles.map(readJsonRecord));

      const cutoff = Date.now() - (14 * 24 * 60 * 60 * 1000);
      const byUser = Object.fromEntries(users.map(user => [user.name, []]));

      records
        .filter(record => record && record.member && record.timestamp)
        .filter(record => {
          const ts = new Date(record.timestamp).getTime();
          return Number.isFinite(ts) && ts >= cutoff;
        })
        .filter(record => !hiddenActivities.includes(record.activity))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
        .forEach(record => {
          if (!byUser[record.member]) return;
          if (record.member === 'Lerverkstan' || byUser[record.member].length < 4) {
            byUser[record.member].push(record);
          }
        });

      renderRows(byUser);
      if (pollStatus) pollStatus.textContent = '';
    }

    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';

      users.forEach(user => {
        const activities = byUser[user.name] || [];
        if (!activities.length) return;

        const row = document.createElement('section');
        row.className = user.featured ? 'user-row featured-row' : 'user-row';

        const nameTag = document.createElement('div');
        nameTag.className = user.featured ? 'name featured-name' : 'name';
        nameTag.textContent = user.name;

        const lane = document.createElement('div');
        lane.className = user.featured
          ? `lane ${user.laneClass} featured-lane`
          : `lane ${user.laneClass}`;

        const visibleActivities = user.name === 'Lerverkstan'
          ? activities
          : activities.slice(0, 4);

        visibleActivities.forEach(activity => {
          const card = document.createElement('article');
          card.className = 'card';
          const imageHtml = activity.hasImage && activity.imageFileName
            ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
            : '';
          card.innerHTML = `
            <div class="title2">${activity.activity || 'Okänd aktivitet'}</div>
            <div class="meta">${formatTime(activity.timestamp)}</div>
            ${imageHtml}
          `;
          lane.appendChild(card);
        });

        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }

    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    });

    buildQrCode();
    updateNightMode();

    if (!isNightMode()) {
      safeLoadActivities();
    } else {
      renderRows({});
    }

    startPolling();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skroja Dashboard</title>
  <style>
    :root{
      --wall:#ddd4c7;
      --frame-a:#bb874f;
      --frame-b:#9c683c;
      --cork:#c99764;
      --cork-2:#bc8755;
      --paper:#f6eddc;
      --ink:#594537;
      --blue:#92b6c4;
      --peach:#d99f84;
      --green:#afbf70;
      --shadow:0 18px 36px rgba(70,48,22,.22);
      --soft:0 8px 16px rgba(70,48,22,.12);
      --sans:"Trebuchet MS", Arial, sans-serif;
      --serif:Georgia, "Times New Roman", serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      padding:14px;
      color:var(--ink);
      font-family:var(--serif);
      background:linear-gradient(180deg,#e2dacf 0%, var(--wall) 100%);
    }
    .frame{
      min-height:calc(100vh - 28px);
      padding:16px;
      border-radius:22px;
      background:
        repeating-linear-gradient(90deg,
          rgba(255,255,255,.09) 0 8px,
          rgba(0,0,0,.03) 8px 16px,
          rgba(255,255,255,.03) 16px 26px),
        linear-gradient(180deg,var(--frame-a) 0%, var(--frame-b) 100%);
      box-shadow:0 24px 42px rgba(62,41,19,.24);
    }
    .board{
      min-height:calc(100vh - 60px);
      padding:18px 18px 14px;
      border-radius:16px;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.18), transparent 14%),
        radial-gradient(circle at 86% 10%, rgba(255,255,255,.12), transparent 13%),
        repeating-linear-gradient(45deg,
          rgba(255,255,255,.04) 0 8px,
          rgba(0,0,0,.02) 8px 16px),
        linear-gradient(180deg,var(--cork) 0%, var(--cork-2) 100%);
    }
    .top{
      display:grid;
      grid-template-columns:220px 1fr 210px;
      gap:18px;
      align-items:start;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }
    .left-note,.qr-note{
      background:rgba(246,237,220,.92);
      border:2px solid rgba(255,255,255,.38);
      border-radius:12px;
      box-shadow:var(--soft);
      font-family:var(--sans);
    }
    .left-note{
      padding:14px 14px 12px;
      transform:rotate(-1deg);
    }
    .left-note h2,.qr-note h2{
      margin:0 0 8px;
      font-size:1rem;
    }
    .left-note p{
      margin:0 0 10px;
      font-size:.92rem;
      line-height:1.35;
    }
    .left-note button{
      width:100%;
      border:none;
      border-radius:10px;
      padding:12px 14px;
      background:linear-gradient(180deg,#9ebccb,#8caebe);
      color:#fff8ef;
      font-family:var(--sans);
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--soft);
    }
    .status{
      margin-top:10px;
      min-height:20px;
      font-size:.9rem;
    }
    .center{
      text-align:center;
      padding-top:4px;
    }
    .title{
      display:inline-block;
      padding:14px 30px 12px;
      border-radius:22px;
      color:#fff9f0;
      font-size:clamp(2.2rem, 3.5vw, 3.1rem);
      line-height:1;
      box-shadow:var(--shadow);
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,0) 14%, rgba(0,0,0,.08) 100%),
        linear-gradient(180deg,#9c683b,#805328);
    }
    .updated{
      margin-top:10px;
      font-family:var(--sans);
      font-size:.98rem;
    }
    .qr-note{
      padding:12px;
      transform:rotate(1.2deg);
      position:relative;
    }
    .qr-note:before{
      content:"";
      position:absolute;
      top:-9px;
      left:50%;
      transform:translateX(-50%);
      width:17px;
      height:17px;
      border-radius:50%;
      background:#d88564;
      box-shadow:0 1px 2px rgba(0,0,0,.24);
    }
    #qrcode{
      width:156px;
      height:156px;
      margin:2px auto 8px;
      background:#fff;
      border-radius:10px;
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);
    }
    #qrcode img{width:140px;height:140px;display:block}
    .link{
      text-align:center;
      font-size:.78rem;
      line-height:1.3;
      word-break:break-word;
    }
    .rows{
      display:grid;
      gap:14px;
      position:relative;
      z-index:1;
    }
    .user-row{
      display:grid;
      grid-template-columns:116px 1fr;
      gap:14px;
      align-items:center;
    }
    .name{
      justify-self:center;
      min-width:90px;
      padding:10px 14px;
      text-align:center;
      font-size:1rem;
      font-weight:700;
      background:var(--paper);
      border:2px solid rgba(239,227,205,.95);
      border-radius:6px;
      box-shadow:var(--soft);
      transform:rotate(-1.4deg);
      position:relative;
    }
    .name:before{
      content:"";
      position:absolute;
      top:-8px;
      left:50%;
      transform:translateX(-50%);
      width:14px;
      height:14px;
      border-radius:50%;
      background:#efe6d6;
      box-shadow:0 1px 2px rgba(0,0,0,.18);
    }
    .lane{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:16px;
      padding:12px;
      min-height:128px;
      border-top:2px solid rgba(122,82,45,.36);
      border-bottom:2px solid rgba(122,82,45,.36);
    }
    .lane-blue{background:linear-gradient(180deg, rgba(146,182,196,.56), rgba(146,182,196,.70))}
    .lane-peach{background:linear-gradient(180deg, rgba(217,159,132,.58), rgba(217,159,132,.72))}
    .lane-green{background:linear-gradient(180deg, rgba(175,191,112,.56), rgba(175,191,112,.70))}
    .card,.empty{
      min-height:108px;
      padding:12px 12px 10px;
      position:relative;
      background:var(--paper);
      border:3px solid rgba(242,233,216,.98);
      border-radius:4px;
      box-shadow:var(--soft);
      display:grid;
      align-content:start;
      gap:6px;
    }
    .card:nth-child(1){transform:rotate(-1.2deg)}
    .card:nth-child(2){transform:rotate(.8deg)}
    .card:nth-child(3){transform:rotate(-.6deg)}
    .empty:nth-child(1){transform:rotate(-1.2deg)}
    .empty:nth-child(2){transform:rotate(.8deg)}
    .empty:nth-child(3){transform:rotate(-.6deg)}
    .card:before,.empty:before{
      content:"";
      position:absolute;
      top:-9px;
      left:50%;
      transform:translateX(-50%);
      width:15px;
      height:15px;
      border-radius:50%;
      box-shadow:0 1px 2px rgba(0,0,0,.2);
      background:#efe6d6;
    }
    .lane-peach .card:before,.lane-peach .empty:before{background:#d78663}
    .lane-green .card:before,.lane-green .empty:before{background:#89aeb3}
    .title2{
      font-size:clamp(1.15rem, 1.7vw, 1.55rem);
      line-height:1.05;
      font-weight:700;
    }
    .meta{
      font-family:var(--sans);
      font-size:.94rem;
    }
    .thumb{
      width:100%;
      aspect-ratio:4 / 2.4;
      object-fit:cover;
      border-radius:2px;
      border:2px solid rgba(226,212,193,.95);
      background:#ecddc8;
      margin-top:2px;
    }
    .empty{
      place-content:center;
      text-align:center;
      opacity:.6;
      color:#7a6550;
    }
    .footer{
      margin-top:18px;
      text-align:center;
      font-family:var(--sans);
      font-size:.9rem;
      position:relative;
      z-index:1;
    }
    @media (max-width:1180px){
      .top{grid-template-columns:1fr;justify-items:center}
      .left-note,.qr-note{width:min(100%,420px)}
      .user-row{grid-template-columns:1fr}
      .name{justify-self:start;margin-left:12px}
    }
    @media (max-width:860px){
      .lane{grid-template-columns:1fr}
      .card,.empty{transform:none !important}
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="board">
      <div class="top">
        <div class="left-note">
          <h2>Visning</h2>
          <p>Klicka för helskärm när dashboarden visas på stor skärm.</p>
          <button id="fullscreen-btn">Helskärm</button>
          <div class="status" id="poll-status">Laddar data…</div>
        </div>

        <div class="center">
          <div class="title">Aktivitetsöversikt</div>
          <div class="updated" id="last-updated">Senast uppdaterad: -</div>
        </div>

        <div class="qr-note">
          <h2>Öppna aktivitetshanteraren</h2>
          <div id="qrcode"></div>
          <div class="link">lynoit.github.io/SkrojaAktivitet.html</div>
        </div>
      </div>

      <div class="rows" id="rows"></div>
      <div class="footer">Skroja · ljus 60-talsstil · senaste tre aktiviteter per användare</div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'Camilla', laneClass: 'lane-blue' },
      { name: 'Christina', laneClass: 'lane-peach' },
      { name: 'Maria', laneClass: 'lane-green' }
    ];

    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };

    const activityAppUrl = 'https://lynoit.github.io/SkrojaAktivitet.html';
    const pollIntervalMs = 15000;
    const rowsContainer = document.getElementById('rows');
    const lastUpdated = document.getElementById('last-updated');
    const pollStatus = document.getElementById('poll-status');

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" referrerpolicy="no-referrer">`;
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
      }
      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);
      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob > Name'));
      return blobNodes.map(node => node.textContent).filter(name => name.endsWith('.json'));
    }

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }

    async function loadActivities() {
      pollStatus.textContent = 'Läser nya filer…';
      const files = await listJsonBlobs();
      const recentFiles = files.sort().reverse().slice(0, 100);
      const records = await Promise.all(recentFiles.map(readJsonRecord));

      const byUser = Object.fromEntries(users.map(user => [user.name, []]));
      records
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
        .forEach(record => {
          if (!byUser[record.member]) return;
          if (byUser[record.member].length < 3) byUser[record.member].push(record);
        });

      renderRows(byUser);
      lastUpdated.textContent = `Senast uppdaterad: ${new Date().toLocaleTimeString('sv-SE')}`;
      pollStatus.textContent = `Kollar efter nya filer var ${pollIntervalMs / 1000}:e sekund`;
    }

    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';

      users.forEach(user => {
        const row = document.createElement('section');
        row.className = 'user-row';

        const nameTag = document.createElement('div');
        nameTag.className = 'name';
        nameTag.textContent = user.name;

        const lane = document.createElement('div');
        lane.className = `lane ${user.laneClass}`;

        const activities = byUser[user.name] || [];
        activities.forEach(activity => {
          const card = document.createElement('article');
          card.className = 'card';
          const imageHtml = activity.hasImage && activity.imageFileName
            ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
            : '';
          card.innerHTML = `
            <div class="title2">${activity.activity || 'Okänd aktivitet'}</div>
            <div class="meta">${formatTime(activity.timestamp)}</div>
            ${imageHtml}
          `;
          lane.appendChild(card);
        });

        for (let i = activities.length; i < 3; i += 1) {
          const empty = document.createElement('article');
          empty.className = 'empty';
          empty.innerHTML = `<div class="title2">Väntar på aktivitet</div>`;
          lane.appendChild(empty);
        }

        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }

    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        pollStatus.textContent = 'Helskärm stöds inte i denna webbläsare.';
      }
    });

    buildQrCode();
    loadActivities().catch(error => {
      console.error(error);
      pollStatus.textContent = error.message;
      renderRows({ Camilla: [], Christina: [], Maria: [] });
    });

    setInterval(() => {
      loadActivities().catch(error => {
        console.error(error);
        pollStatus.textContent = error.message;
      });
    }, pollIntervalMs);
  </script>
</body>
</html>

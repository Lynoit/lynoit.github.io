<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skroja Dashboard</title>
  <style>
    :root{
      --wall:#dfd6c9;
      --frame-a:#be8b55;
      --frame-b:#9c673b;
      --frame-c:#845328;
      --cork-a:#d2a06b;
      --cork-b:#bf8752;
      --cork-c:#b57b47;
      --paper:#f7eedf;
      --paper-2:#efe2cc;
      --ink:#5a4738;
      --blue:#98b8c6;
      --peach:#dda286;
      --green:#b5c171;
      --shadow:0 18px 36px rgba(70,48,22,.22);
      --soft:0 8px 16px rgba(70,48,22,.12);
      --sans:"Trebuchet MS", Arial, sans-serif;
      --serif:Georgia, "Times New Roman", serif;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      padding:14px;
      color:var(--ink);
      font-family:var(--serif);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.45), transparent 24%),
        linear-gradient(180deg,#e5ddd1 0%, var(--wall) 100%);
    }

    .frame{
      min-height:calc(100vh - 28px);
      padding:16px;
      border-radius:24px;
      background:
        repeating-linear-gradient(90deg,
          rgba(255,255,255,.09) 0 8px,
          rgba(0,0,0,.03) 8px 16px,
          rgba(255,255,255,.03) 16px 28px),
        linear-gradient(180deg,var(--frame-a) 0%, var(--frame-b) 74%, var(--frame-c) 100%);
      box-shadow:0 24px 42px rgba(62,41,19,.24);
    }

    .board{
      min-height:calc(100vh - 60px);
      padding:20px 18px 14px;
      border-radius:18px;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 12% 14%, rgba(255,255,255,.18), transparent 10%),
        radial-gradient(circle at 84% 12%, rgba(255,255,255,.12), transparent 10%),
        radial-gradient(circle at 30% 28%, rgba(140,88,40,.12), transparent 14%),
        linear-gradient(180deg,var(--cork-a) 0%, var(--cork-b) 58%, var(--cork-c) 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.07),
        inset 0 18px 40px rgba(255,255,255,.05),
        inset 0 -18px 28px rgba(91,56,27,.07);
    }

    .board:before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.58;
      background:
        radial-gradient(circle at 8% 18%, rgba(120,74,34,.16) 0 1px, transparent 1.2px),
        radial-gradient(circle at 22% 36%, rgba(255,255,255,.08) 0 1px, transparent 1.2px),
        radial-gradient(circle at 36% 24%, rgba(145,90,41,.13) 0 1.1px, transparent 1.4px),
        radial-gradient(circle at 52% 16%, rgba(255,255,255,.07) 0 .9px, transparent 1.2px),
        radial-gradient(circle at 68% 34%, rgba(121,74,35,.16) 0 1px, transparent 1.3px),
        radial-gradient(circle at 79% 22%, rgba(255,255,255,.08) 0 .9px, transparent 1.2px),
        radial-gradient(circle at 88% 42%, rgba(132,82,38,.15) 0 1.1px, transparent 1.4px);
      background-size: 120px 90px, 140px 100px, 160px 120px, 150px 110px, 130px 95px, 170px 120px, 155px 105px;
      mix-blend-mode:multiply;
    }

    .board:after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.18;
      background:
        repeating-linear-gradient(35deg,
          rgba(255,255,255,.035) 0 2px,
          rgba(0,0,0,.02) 2px 4px,
          transparent 4px 10px),
        repeating-linear-gradient(125deg,
          rgba(255,255,255,.02) 0 3px,
          rgba(0,0,0,.018) 3px 6px,
          transparent 6px 12px);
    }

    .top{
      display:grid;
      grid-template-columns:210px 1fr 200px;
      gap:18px;
      align-items:start;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }

    .pin-note,.qr-note{
      background:linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,.06)), var(--paper);
      border:2px solid rgba(247,238,223,.96);
      border-radius:6px;
      box-shadow:var(--soft);
      font-family:var(--sans);
      position:relative;
    }

    .pin-note:before,.qr-note:before{
      content:"";
      position:absolute;
      top:-10px;
      left:50%;
      transform:translateX(-50%);
      width:18px;
      height:18px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.95) 0 2px, rgba(255,255,255,.55) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #f4ead9 0 5px, #d8c2a7 5px 7px, #8c6b4f 7px 9px);
      box-shadow:
        0 2px 3px rgba(0,0,0,.28),
        inset 0 -1px 2px rgba(0,0,0,.18);
    }

    .pin-note{
      padding:14px 14px 12px;
      transform:rotate(-1.2deg);
      margin-top:8px;
    }

    .pin-note h2,.qr-note h2{
      margin:0 0 8px;
      font-size:1rem;
      line-height:1.15;
    }

    .pin-note p{
      margin:0 0 10px;
      font-size:.92rem;
      line-height:1.35;
    }

    .pin-note button{
      width:100%;
      border:none;
      border-radius:10px;
      padding:12px 14px;
      background:linear-gradient(180deg,#9ebdcc,#8aabbb);
      color:#fff8ef;
      font-family:var(--sans);
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--soft);
    }

    .status{
      margin-top:10px;
      min-height:20px;
      font-size:.9rem;
      color:#7a6551;
    }

    .center{
      text-align:center;
      padding-top:2px;
    }

    .title{
      display:inline-block;
      padding:16px 36px 13px;
      border-radius:24px;
      color:#fff9f0;
      font-size:clamp(2.4rem, 3.6vw, 3.25rem);
      line-height:1;
      box-shadow:var(--shadow);
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,0) 14%, rgba(0,0,0,.08) 100%),
        linear-gradient(180deg,#9d693c,#7f5227);
    }

    .updated{
      margin-top:10px;
      font-family:var(--sans);
      font-size:.98rem;
    }

    .qr-note{
      padding:12px;
      transform:rotate(1.5deg);
      margin-top:10px;
    }

    .qr-note:before{
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.85) 0 2px, rgba(255,255,255,.35) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #e59877 0 5px, #c97252 5px 7px, #845440 7px 9px);
    }

    #qrcode{
      width:154px;
      height:154px;
      margin:4px auto 8px;
      background:#fff;
      border-radius:8px;
      padding:7px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);
    }

    #qrcode img{
      width:140px;
      height:140px;
      display:block;
    }

    .link{
      text-align:center;
      font-size:.76rem;
      line-height:1.28;
      word-break:break-word;
    }

    .rows{
      display:grid;
      gap:18px;
      position:relative;
      z-index:1;
      margin-top:2px;
    }

    .user-row{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:18px;
      align-items:center;
    }

    .name{
      justify-self:center;
      min-width:92px;
      padding:10px 14px;
      text-align:center;
      font-size:1rem;
      font-weight:700;
      background:linear-gradient(180deg, rgba(255,255,255,.30), rgba(255,255,255,.04)), var(--paper);
      border:2px solid rgba(241,232,214,.98);
      border-radius:6px;
      box-shadow:var(--soft);
      transform:rotate(-1.4deg);
      position:relative;
      font-family:var(--sans);
    }

    .name:before{
      content:"";
      position:absolute;
      top:-9px;
      left:50%;
      transform:translateX(-50%);
      width:16px;
      height:16px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.95) 0 2px, rgba(255,255,255,.5) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #efe6d6 0 4px, #d1bca2 4px 6px, #86664b 6px 8px);
      box-shadow:0 2px 3px rgba(0,0,0,.22), inset 0 -1px 2px rgba(0,0,0,.15);
    }

    .lane{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:18px;
      padding:14px 12px;
      min-height:138px;
      border-top:2px solid rgba(122,82,45,.34);
      border-bottom:2px solid rgba(122,82,45,.34);
      border-left:1px solid rgba(255,255,255,.18);
      border-right:1px solid rgba(255,255,255,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
    }

    .lane-blue{
      background:linear-gradient(180deg, rgba(152,184,198,.58), rgba(152,184,198,.73));
    }
    .lane-peach{
      background:linear-gradient(180deg, rgba(221,162,134,.58), rgba(221,162,134,.74));
    }
    .lane-green{
      background:linear-gradient(180deg, rgba(181,193,113,.56), rgba(181,193,113,.72));
    }

    .card,.empty{
      min-height:112px;
      padding:12px 12px 10px;
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,.08)),
        var(--paper);
      border:3px solid rgba(244,236,222,.98);
      border-radius:3px;
      box-shadow:var(--soft);
      display:grid;
      align-content:start;
      gap:6px;
    }

    .lane .card:nth-child(1), .lane .empty:nth-child(1){ transform:rotate(-1.5deg); }
    .lane .card:nth-child(2), .lane .empty:nth-child(2){ transform:rotate(.95deg); }
    .lane .card:nth-child(3), .lane .empty:nth-child(3){ transform:rotate(-.75deg); }

    .card:before,.empty:before{
      content:"";
      position:absolute;
      top:-10px;
      left:50%;
      transform:translateX(-50%);
      width:17px;
      height:17px;
      border-radius:50%;
      box-shadow:0 2px 3px rgba(0,0,0,.24), inset 0 -1px 2px rgba(0,0,0,.16);
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.95) 0 2px, rgba(255,255,255,.45) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #efe6d6 0 4px, #d1bca2 4px 6px, #86664b 6px 8px);
    }

    .lane-peach .card:before,.lane-peach .empty:before{
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.9) 0 2px, rgba(255,255,255,.35) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #e79a78 0 4px, #cb7354 4px 6px, #855341 6px 8px);
    }
    .lane-green .card:before,.lane-green .empty:before{
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.9) 0 2px, rgba(255,255,255,.35) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #93b8bb 0 4px, #6f9ea1 4px 6px, #4f6d70 6px 8px);
    }

    .title2{
      font-size:clamp(1.15rem, 1.7vw, 1.62rem);
      line-height:1.03;
      font-weight:700;
    }

    .meta{
      font-family:var(--sans);
      font-size:.94rem;
    }

    .thumb{
      width:100%;
      aspect-ratio:4 / 2.45;
      object-fit:cover;
      border-radius:2px;
      border:2px solid rgba(226,212,193,.95);
      background:#ecddc8;
      margin-top:2px;
    }

    .empty{
      place-content:center;
      text-align:center;
      opacity:.58;
      color:#7a6550;
    }

    .footer{
      margin-top:18px;
      text-align:center;
      font-family:var(--sans);
      font-size:.9rem;
      position:relative;
      z-index:1;
      opacity:.96;
    }

    @media (max-width:1180px){
      .top{
        grid-template-columns:1fr;
        justify-items:center;
      }
      .pin-note,.qr-note{
        width:min(100%,420px);
      }
      .user-row{
        grid-template-columns:1fr;
      }
      .name{
        justify-self:start;
        margin-left:12px;
      }
    }

    @media (max-width:860px){
      .lane{
        grid-template-columns:1fr;
      }
      .card,.empty{
        transform:none !important;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="board">
      <div class="top">
        <div class="pin-note">
          <h2>Visning</h2>
          <p>Klicka för helskärm när dashboarden visas på stor skärm.</p>
          <button id="fullscreen-btn">Helskärm</button>
          <div class="status" id="poll-status">Laddar data…</div>
        </div>

        <div class="center">
          <div class="title">Aktivitetsöversikt</div>
          <div class="updated" id="last-updated">Senast uppdaterad: -</div>
        </div>

        <div class="qr-note">
          <h2>Öppna aktivitetshanteraren</h2>
          <div id="qrcode"></div>
          <div class="link">lynoit.github.io/SkrojaAktivitet.html</div>
        </div>
      </div>

      <div class="rows" id="rows"></div>
      <div class="footer">Skroja · ljus 60-talsstil · senaste tre aktiviteter per användare</div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'Camilla', laneClass: 'lane-blue' },
      { name: 'Christina', laneClass: 'lane-peach' },
      { name: 'Maria', laneClass: 'lane-green' }
    ];

    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };

    const activityAppUrl = 'https://lynoit.github.io/SkrojaAktivitet.html';
    const pollIntervalMs = 15000;
    const rowsContainer = document.getElementById('rows');
    const lastUpdated = document.getElementById('last-updated');
    const pollStatus = document.getElementById('poll-status');

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" referrerpolicy="no-referrer">`;
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
      }
      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);
      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob > Name'));
      return blobNodes.map(node => node.textContent).filter(name => name.endsWith('.json'));
    }

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }

    async function loadActivities() {
      pollStatus.textContent = 'Läser nya filer…';
      const files = await listJsonBlobs();
      const recentFiles = files.sort().reverse().slice(0, 100);
      const records = await Promise.all(recentFiles.map(readJsonRecord));

      const byUser = Object.fromEntries(users.map(user => [user.name, []]));
      records
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
        .forEach(record => {
          if (!byUser[record.member]) return;
          if (byUser[record.member].length < 3) byUser[record.member].push(record);
        });

      renderRows(byUser);
      lastUpdated.textContent = `Senast uppdaterad: ${new Date().toLocaleTimeString('sv-SE')}`;
      pollStatus.textContent = `Kollar efter nya filer var ${pollIntervalMs / 1000}:e sekund`;
    }

    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';

      users.forEach(user => {
        const row = document.createElement('section');
        row.className = 'user-row';

        const nameTag = document.createElement('div');
        nameTag.className = 'name';
        nameTag.textContent = user.name;

        const lane = document.createElement('div');
        lane.className = `lane ${user.laneClass}`;

        const activities = byUser[user.name] || [];
        activities.forEach(activity => {
          const card = document.createElement('article');
          card.className = 'card';
          const imageHtml = activity.hasImage && activity.imageFileName
            ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
            : '';
          card.innerHTML = `
            <div class="title2">${activity.activity || 'Okänd aktivitet'}</div>
            <div class="meta">${formatTime(activity.timestamp)}</div>
            ${imageHtml}
          `;
          lane.appendChild(card);
        });

        for (let i = activities.length; i < 3; i += 1) {
          const empty = document.createElement('article');
          empty.className = 'empty';
          empty.innerHTML = `<div class="title2">Väntar på aktivitet</div>`;
          lane.appendChild(empty);
        }

        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }

    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        pollStatus.textContent = 'Helskärm stöds inte i denna webbläsare.';
      }
    });

    buildQrCode();
    loadActivities().catch(error => {
      console.error(error);
      pollStatus.textContent = error.message;
      renderRows({ Camilla: [], Christina: [], Maria: [] });
    });

    setInterval(() => {
      loadActivities().catch(error => {
        console.error(error);
        pollStatus.textContent = error.message;
      });
    }, pollIntervalMs);
  </script>
</body>
</html>

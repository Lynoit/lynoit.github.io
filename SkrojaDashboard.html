<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skroja Dashboard</title>
  <style>
    :root {
      --bg: #ece4d6;
      --paper: #f9f5eb;
      --wood: #ad7b48;
      --wood-dark: #87582f;
      --blue: #9dbfca;
      --green: #bcc587;
      --yellow: #dfcb79;
      --peach: #d9a58b;
      --text: #564739;
      --line: #dccdb8;
      --shadow: 0 12px 26px rgba(85, 60, 35, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #ddd2c0 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      padding: 20px;
    }

    .board {
      width: 100%;
      min-height: calc(100vh - 40px);
      background: linear-gradient(180deg, #bd8c58 0%, #a47243 100%);
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(60, 41, 20, 0.18);
      padding: 22px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    .board-inner {
      background: rgba(249, 245, 235, 0.55);
      border-radius: 22px;
      padding: 18px;
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 18px;
      align-items: center;
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .title-plank {
      background: linear-gradient(180deg, #8a5d35 0%, var(--wood-dark) 100%);
      color: #fff8ef;
      padding: 10px 26px;
      border-radius: 18px;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .status-line {
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.95rem;
    }

    .qr-card, .control-card {
      background: var(--paper);
      border: 2px solid #e4d7c4;
      border-radius: 18px;
      padding: 12px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .qr-card h2, .control-card h2 {
      margin: 0;
      font-size: 1rem;
      font-family: "Trebuchet MS", Arial, sans-serif;
    }

    .qr-card p, .control-card p {
      margin: 0;
      font-size: 0.88rem;
      font-family: "Trebuchet MS", Arial, sans-serif;
      line-height: 1.3;
    }

    #qrcode {
      width: 152px;
      height: 152px;
      background: white;
      border-radius: 12px;
      padding: 8px;
    }

    .link-text {
      font-size: 0.78rem;
      word-break: break-all;
    }

    .control-card button {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      background: var(--blue);
      color: white;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .rows {
      display: grid;
      gap: 14px;
    }

    .user-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .name-tag {
      background: rgba(249, 245, 235, 0.95);
      border: 2px solid #ebdecc;
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      font-size: clamp(1.4rem, 2vw, 2rem);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .activity-lane {
      min-height: 158px;
      border-radius: 18px;
      border: 2px solid rgba(242, 235, 222, 0.85);
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .lane-blue { background: rgba(157, 191, 202, 0.72); }
    .lane-peach { background: rgba(217, 165, 139, 0.68); }
    .lane-green { background: rgba(188, 197, 135, 0.68); }

    .activity-card, .empty-card {
      background: var(--paper);
      border: 2px solid rgba(255,255,255,0.78);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(90, 66, 43, 0.12);
      display: grid;
      gap: 8px;
      align-content: start;
      min-height: 130px;
    }

    .activity-card h3, .empty-card h3 {
      margin: 0;
      font-size: clamp(1.2rem, 1.8vw, 1.8rem);
      line-height: 1.1;
    }

    .meta {
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.95rem;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid #eee2d1;
      background: #efe5d6;
    }

    .empty-card {
      opacity: 0.55;
      place-content: center;
      text-align: center;
      color: #856f5a;
    }

    .footer-note {
      text-align: center;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    @media (max-width: 1120px) {
      .topbar {
        grid-template-columns: 1fr;
      }
      .title-wrap { order: -1; }
      .user-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      .activity-lane {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="board">
    <div class="board-inner">
      <div class="topbar">
        <div class="control-card">
          <h2>Visning</h2>
          <p>Klicka för helskärm när dashboarden visas på stor skärm.</p>
          <button id="fullscreen-btn">Helskärm</button>
          <p id="poll-status">Laddar data…</p>
        </div>

        <div class="title-wrap">
          <div class="title-plank">Aktivitetsöversikt</div>
          <div class="status-line" id="last-updated">Senast uppdaterad: -</div>
        </div>

        <div class="qr-card">
          <h2>Öppna aktivitetshanteraren</h2>
          <div id="qrcode"></div>
          <p class="link-text">lynoit.github.io/SkrojaAktivitet.html</p>
        </div>
      </div>

      <div class="rows" id="rows"></div>
      <div class="footer-note">Skroja · ljus 60-talsstil · senaste tre aktiviteter per användare</div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'Camilla', laneClass: 'lane-blue' },
      { name: 'Christina', laneClass: 'lane-peach' },
      { name: 'Maria', laneClass: 'lane-green' }
    ];

    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'PASTA_IN_DIN_SAS_TOKEN_HAR'
    };

    const activityAppUrl = 'https://lynoit.github.io/SkrojaAktivitet.html';
    const pollIntervalMs = 15000;

    const rowsContainer = document.getElementById('rows');
    const lastUpdated = document.getElementById('last-updated');
    const pollStatus = document.getElementById('poll-status');

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=136x136&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" width="136" height="136" loading="eager" referrerpolicy="no-referrer">`;
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getBlobBaseUrl() {
      const sas = azureConfig.sasToken.replace(/^\?/, '');
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
      }

      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`Kunde inte läsa från Azure (${response.status}).`);
      }
      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob > Name'));
      return blobNodes.map(node => node.textContent).filter(name => name.endsWith('.json'));
    }

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`Kunde inte läsa ${fileName}`);
      }
      const data = await response.json();
      return data;
    }

    async function loadActivities() {
      pollStatus.textContent = 'Läser nya filer…';
      const files = await listJsonBlobs();
      const recentFiles = files.sort().reverse().slice(0, 100);
      const records = await Promise.all(recentFiles.map(readJsonRecord));

      const byUser = Object.fromEntries(users.map(user => [user.name, []]));
      records
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
        .forEach(record => {
          if (!byUser[record.member]) return;
          if (byUser[record.member].length < 3) {
            byUser[record.member].push(record);
          }
        });

      renderRows(byUser);
      lastUpdated.textContent = `Senast uppdaterad: ${new Date().toLocaleTimeString('sv-SE')}`;
      pollStatus.textContent = `Kollar efter nya filer var ${pollIntervalMs / 1000}:e sekund`;
    }

    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';

      users.forEach(user => {
        const row = document.createElement('section');
        row.className = 'user-row';

        const nameTag = document.createElement('div');
        nameTag.className = 'name-tag';
        nameTag.textContent = user.name;

        const lane = document.createElement('div');
        lane.className = `activity-lane ${user.laneClass}`;

        const activities = byUser[user.name] || [];
        activities.forEach(activity => {
          const card = document.createElement('article');
          card.className = 'activity-card';
          const imageHtml = activity.hasImage && activity.imageFileName
            ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
            : '';
          card.innerHTML = `
            <h3>${activity.activity || 'Okänd aktivitet'}</h3>
            <div class="meta">${formatTime(activity.timestamp)}</div>
            ${imageHtml}
          `;
          lane.appendChild(card);
        });

        for (let i = activities.length; i < 3; i += 1) {
          const empty = document.createElement('article');
          empty.className = 'empty-card';
          empty.innerHTML = '<h3>Väntar på aktivitet</h3>';
          lane.appendChild(empty);
        }

        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }

    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.error(error);
        pollStatus.textContent = 'Helskärm stöds inte i denna webbläsare.';
      }
    });

    buildQrCode();
    loadActivities().catch(error => {
      console.error(error);
      pollStatus.textContent = error.message;
      renderRows({ Camilla: [], Christina: [], Maria: [] });
    });
    setInterval(() => {
      loadActivities().catch(error => {
        console.error(error);
        pollStatus.textContent = error.message;
      });
    }, pollIntervalMs);
  </script>
</body>
</html>

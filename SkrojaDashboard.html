<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skroja Dashboard</title>
  <style>
    :root {
      --bg: #ddd5c7;
      --board: #b68551;
      --board-dark: #9f6d3f;
      --paper: #f6f0e4;
      --ink: #564234;
      --shadow: 0 16px 28px rgba(84, 58, 30, 0.18);
      --soft-shadow: 0 8px 16px rgba(84, 58, 30, 0.12);
      --sans: "Trebuchet MS", Arial, sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: linear-gradient(180deg, #e3dbcf 0%, var(--bg) 100%);
      color: var(--ink); font-family: var(--serif); padding: 14px;
    }
    .board {
      min-height: calc(100vh - 28px); border-radius: 18px; padding: 16px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03) 7%, rgba(0,0,0,0.05) 94%, rgba(255,255,255,0.1)),
        linear-gradient(180deg, var(--board) 0%, var(--board-dark) 100%);
      box-shadow: 0 18px 36px rgba(60, 41, 20, 0.22);
    }
    .board-inner {
      min-height: calc(100vh - 60px); padding: 18px 18px 14px; border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02)), #d3b28e;
      position: relative; overflow: hidden;
    }
    .topbar {
      position: relative; z-index: 1; display: grid; grid-template-columns: 1fr auto 230px;
      gap: 18px; align-items: center; margin-bottom: 18px;
    }
    .control-note, .qr-note {
      padding: 16px 18px; background: rgba(246, 240, 228, 0.84); border: 2px solid rgba(255,255,255,0.34);
      border-radius: 18px; box-shadow: var(--soft-shadow); font-family: var(--sans);
    }
    .control-note { max-width: 340px; }
    .control-note h2, .qr-note h2 { margin: 0 0 6px; font-size: 1.05rem; }
    .control-note p { margin: 0 0 10px; line-height: 1.35; font-size: 0.95rem; }
    .control-note button {
      width: 100%; border: none; border-radius: 14px; padding: 12px 14px;
      background: linear-gradient(180deg, #9ebdcb, #8eb0c0); color: #fff8ef;
      font-family: var(--sans); font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: var(--soft-shadow);
    }
    .status-line { margin-top: 10px; min-height: 20px; font-size: 0.92rem; }
    .title-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .title-plank {
      padding: 14px 30px 12px; border-radius: 20px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08), rgba(255,255,255,0) 14%, rgba(0,0,0,0.06) 100%),
        linear-gradient(180deg, #9c6b3d, #86592f);
      color: #fff7ee; box-shadow: var(--shadow); font-size: clamp(2rem, 3vw, 3rem); line-height: 1; white-space: nowrap;
    }
    .last-updated { font-family: var(--sans); font-size: 0.98rem; }
    .qr-note { justify-self: end; width: 230px; padding: 14px; }
    #qrcode {
      width: 158px; height: 158px; margin: 0 auto 8px; padding: 8px; background: white;
      border-radius: 12px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center;
    }
    #qrcode img { display: block; width: 142px; height: 142px; }
    .link-text { font-size: 0.8rem; text-align: center; word-break: break-word; line-height: 1.35; }
    .rows { position: relative; z-index: 1; display: grid; gap: 14px; margin-top: 8px; }
    .user-row { display: grid; grid-template-columns: 120px 1fr; align-items: center; gap: 14px; }
    .name-tag {
      justify-self: center; min-width: 92px; padding: 10px 16px; background: var(--paper);
      border: 2px solid rgba(227, 217, 198, 0.86); border-radius: 7px; text-align: center;
      font-size: 1rem; font-weight: 700; box-shadow: var(--soft-shadow); transform: rotate(-1deg); position: relative;
    }
    .activity-lane {
      position: relative; min-height: 120px; padding: 12px 12px; display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; align-items: center;
      border-top: 2px solid rgba(145, 101, 56, 0.35); border-bottom: 2px solid rgba(145, 101, 56, 0.35);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22);
    }
    .lane-blue  { background: linear-gradient(180deg, rgba(137, 176, 193, 0.58), rgba(137, 176, 193, 0.68)); }
    .lane-peach { background: linear-gradient(180deg, rgba(218, 160, 132, 0.62), rgba(218, 160, 132, 0.72)); }
    .lane-green { background: linear-gradient(180deg, rgba(171, 188, 120, 0.58), rgba(171, 188, 120, 0.70)); }
    .activity-card, .empty-card {
      position: relative; min-height: 104px; padding: 12px 12px 10px; background: var(--paper);
      border: 3px solid rgba(242, 233, 216, 0.95); border-radius: 4px; box-shadow: var(--soft-shadow); display: grid; align-content: start; gap: 6px;
    }
    .activity-card::before, .empty-card::before {
      content: ""; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      width: 16px; height: 16px; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,0.18);
      background: #ede8d8;
    }
    .lane-peach .activity-card::before, .lane-peach .empty-card::before { background: #d88465; }
    .lane-green .activity-card::before, .lane-green .empty-card::before { background: #8eb2b6; }
    .card-title { font-size: clamp(1.1rem, 1.6vw, 1.5rem); line-height: 1.08; font-weight: 700; }
    .card-meta { font-family: var(--sans); font-size: 0.95rem; line-height: 1.2; }
    .thumb {
      width: 100%; aspect-ratio: 4 / 2.35; object-fit: cover; border-radius: 2px;
      border: 2px solid rgba(225, 213, 195, 0.92); background: #efe2cf; margin-top: 2px;
    }
    .empty-card { opacity: 0.56; place-content: center; text-align: center; color: #7c6856; }
    .footer-note {
      position: relative; z-index: 1; text-align: center; margin-top: 18px;
      font-family: var(--sans); font-size: 0.9rem; opacity: 0.92;
    }
    @media (max-width: 1200px) {
      .topbar { grid-template-columns: 1fr; justify-items: center; }
      .control-note, .qr-note { justify-self: center; max-width: 420px; width: 100%; }
      .user-row { grid-template-columns: 1fr; }
      .name-tag { justify-self: start; margin-left: 12px; }
    }
    @media (max-width: 840px) {
      .activity-lane { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="board">
    <div class="board-inner">
      <div class="topbar">
        <div class="control-note">
          <h2>Visning</h2>
          <p>Klicka för helskärm när dashboarden visas på stor skärm.</p>
          <button id="fullscreen-btn">Helskärm</button>
          <div class="status-line" id="poll-status">Laddar data…</div>
        </div>
        <div class="title-wrap">
          <div class="title-plank">Aktivitetsöversikt</div>
          <div class="last-updated" id="last-updated">Senast uppdaterad: -</div>
        </div>
        <div class="qr-note">
          <h2>Öppna aktivitetshanteraren</h2>
          <div id="qrcode"></div>
          <div class="link-text">lynoit.github.io/SkrojaAktivitet.html</div>
        </div>
      </div>
      <div class="rows" id="rows"></div>
      <div class="footer-note">Skroja · ljus 60-talsstil · senaste tre aktiviteter per användare</div>
    </div>
  </div>
  <script>
    const users = [
      { name: 'Camilla', laneClass: 'lane-blue' },
      { name: 'Christina', laneClass: 'lane-peach' },
      { name: 'Maria', laneClass: 'lane-green' }
    ];
    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };
    const activityAppUrl = 'https://lynoit.github.io/SkrojaAktivitet.html';
    const pollIntervalMs = 15000;
    const rowsContainer = document.getElementById('rows');
    const lastUpdated = document.getElementById('last-updated');
    const pollStatus = document.getElementById('poll-status');

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=142x142&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" referrerpolicy="no-referrer">`;
    }
    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }
    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }
    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
      }
      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);
      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob > Name'));
      return blobNodes.map(node => node.textContent).filter(name => name.endsWith('.json'));
    }
    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }
    async function loadActivities() {
      pollStatus.textContent = 'Läser nya filer…';
      const files = await listJsonBlobs();
      const recentFiles = files.sort().reverse().slice(0, 100);
      const records = await Promise.all(recentFiles.map(readJsonRecord));
      const byUser = Object.fromEntries(users.map(user => [user.name, []]));
      records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach(record => {
        if (!byUser[record.member]) return;
        if (byUser[record.member].length < 3) byUser[record.member].push(record);
      });
      renderRows(byUser);
      lastUpdated.textContent = `Senast uppdaterad: ${new Date().toLocaleTimeString('sv-SE')}`;
      pollStatus.textContent = `Kollar efter nya filer var ${pollIntervalMs / 1000}:e sekund`;
    }
    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';
      users.forEach(user => {
        const row = document.createElement('section');
        row.className = 'user-row';
        const nameTag = document.createElement('div');
        nameTag.className = 'name-tag';
        nameTag.textContent = user.name;
        const lane = document.createElement('div');
        lane.className = `activity-lane ${user.laneClass}`;
        const activities = byUser[user.name] || [];
        activities.forEach(activity => {
          const card = document.createElement('article');
          card.className = 'activity-card';
          const imageHtml = activity.hasImage && activity.imageFileName
            ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
            : '';
          card.innerHTML = `<div class="card-title">${activity.activity || 'Okänd aktivitet'}</div><div class="card-meta">${formatTime(activity.timestamp)}</div>${imageHtml}`;
          lane.appendChild(card);
        });
        for (let i = activities.length; i < 3; i += 1) {
          const empty = document.createElement('article');
          empty.className = 'empty-card';
          empty.innerHTML = '<div class="card-title">Väntar på aktivitet</div>';
          lane.appendChild(empty);
        }
        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }
    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        pollStatus.textContent = 'Helskärm stöds inte i denna webbläsare.';
      }
    });
    buildQrCode();
    loadActivities().catch(error => {
      console.error(error);
      pollStatus.textContent = error.message;
      renderRows({ Camilla: [], Christina: [], Maria: [] });
    });
    setInterval(() => {
      loadActivities().catch(error => {
        console.error(error);
        pollStatus.textContent = error.message;
      });
    }, pollIntervalMs);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Skroja Aktivitet</title>
  <style>
    :root {
      --bg: #e8e1d7;
      --paper: #f6f0e4;
      --paper-deep: #efe5d3;
      --wood-1: #ba8a53;
      --wood-2: #a87441;
      --wood-3: #8c6135;
      --ink: #5b4636;
      --line: #b8a288;
      --blue: #7eabc7;
      --green: #aeb95f;
      --yellow: #e4ce80;
      --coral: #db8956;
      --cream: #ead8b9;
      --shadow: 0 18px 34px rgba(85, 60, 35, 0.18);
      --soft-shadow: 0 8px 18px rgba(85, 60, 35, 0.10);
      --radius-shell: 42px;
      --radius-screen: 28px;
      --radius-card: 16px;
      --sans: "Trebuchet MS", Arial, sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.55), transparent 32%),
        linear-gradient(180deg, #ddd5c7 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: var(--serif);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .phone-shell {
      width: min(100%, 365px);
      min-height: min(90vh, 820px);
      padding: 14px;
      border-radius: var(--radius-shell);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.12), rgba(255,255,255,0) 8%, rgba(0,0,0,0.05) 92%, rgba(255,255,255,0.1)),
        linear-gradient(180deg, var(--wood-1), var(--wood-2));
      box-shadow: 0 24px 40px rgba(72, 47, 22, 0.24);
      position: relative;
    }
    .phone-shell::before,
    .phone-shell::after {
      content: "";
      position: absolute;
      top: 78px;
      width: 6px;
      height: 56px;
      border-radius: 6px;
      background: rgba(255,255,255,0.45);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.12);
    }
    .phone-shell::before { left: -3px; }
    .phone-shell::after { right: -3px; height: 42px; top: 110px; }
    .phone-screen {
      min-height: calc(min(90vh, 820px) - 28px);
      border-radius: var(--radius-screen);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,0.65), transparent 14%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.3), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,0.65), rgba(255,255,255,0.1)),
        var(--paper);
      border: 2px solid rgba(126, 97, 62, 0.22);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.48), inset 0 -14px 30px rgba(177, 150, 115, 0.08);
      position: relative;
      overflow: hidden;
      padding: 24px 18px 22px;
    }
    .phone-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(112,84,48,0.06) 0.8px, transparent 0.8px),
        radial-gradient(rgba(255,255,255,0.28) 0.7px, transparent 0.7px);
      background-position: 0 0, 8px 8px;
      background-size: 16px 16px;
      opacity: 0.34;
      pointer-events: none;
    }
    .inner { position: relative; z-index: 1; max-width: 100%; }
    .app-note {
      text-align: center; font-size: 0.92rem; letter-spacing: 0.03em;
      font-family: var(--sans); opacity: 0.76; margin: 4px 0 10px;
    }
    .step { display: none; }
    .step.active { display: block; }
    h1 {
      margin: 22px 0 10px; text-align: center; font-size: clamp(2.05rem, 5vw, 2.45rem);
      line-height: 1.1; color: #513f31;
    }
    .rule {
      width: 84%; height: 2px; margin: 0 auto 24px;
      background: linear-gradient(90deg, transparent, rgba(85, 60, 35, 0.44), transparent);
    }
    .button-grid {
      display: grid; gap: 14px; width: min(100%, 210px); margin: 0 auto;
    }
    button, input[type="text"] { font-family: var(--sans); }
    .choice, .action, .secondary {
      border: none; border-radius: 11px; min-height: 56px; padding: 12px 16px;
      font-size: 1.08rem; font-weight: 700; cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease; box-shadow: var(--soft-shadow);
    }
    .choice:active, .action:active, .secondary:active { transform: translateY(1px) scale(0.99); }
    .choice {
      color: #fff8ef; text-shadow: 0 1px 0 rgba(0,0,0,0.12);
      border: 1px solid rgba(111, 79, 49, 0.16);
    }
    .blue { background: linear-gradient(180deg, #8fb8d0, var(--blue)); }
    .green { background: linear-gradient(180deg, #bcc876, var(--green)); }
    .yellow { background: linear-gradient(180deg, #ecd898, var(--yellow)); color: #5d4a32; text-shadow: none; }
    .coral { background: linear-gradient(180deg, #e79a6b, var(--coral)); }
    .step-activity .button-grid { width: min(100%, 220px); gap: 10px; }
    .field-wrap { width: min(100%, 220px); margin: 12px auto 0; }
    .field-label { display: block; margin-bottom: 6px; font-size: 0.98rem; font-family: var(--sans); opacity: 0.84; }
    input[type="text"] {
      width: 100%; border-radius: 10px; border: 2px solid #daccb7; background: rgba(255,255,255,0.68);
      padding: 11px 14px; font-size: 1rem; color: var(--ink); box-shadow: inset 0 1px 3px rgba(116, 86, 51, 0.08);
    }
    .stack { width: min(100%, 220px); margin: 10px auto 0; display: grid; gap: 10px; }
    .action { background: linear-gradient(180deg, #e79361, var(--coral)); color: #fff8ef; }
    .secondary { background: linear-gradient(180deg, #a7c5d3, #90b2c2); color: #fdf8ef; }
    .question-card, .summary-sheet, .result-sheet {
      width: min(100%, 245px); margin: 0 auto; background: rgba(251, 247, 239, 0.78);
      border-radius: 14px; border: 2px solid rgba(148, 118, 84, 0.16);
      box-shadow: 0 10px 16px rgba(95, 69, 40, 0.09); padding: 12px 12px 14px;
    }
    .question-card p, .result-sheet p {
      margin: 0; font-family: var(--sans); line-height: 1.45; text-align: center; font-size: 0.98rem;
    }
    .camera-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
    .camera-actions .choice { min-height: 60px; font-size: 1.06rem; }
    .summary-sheet { padding: 12px; position: relative; }
    .summary-sheet::before {
      content: ""; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      width: 15px; height: 15px; border-radius: 50%; background: #d7845d; box-shadow: 0 1px 1px rgba(0,0,0,0.18);
    }
    .summary-title { padding-top: 8px; margin-bottom: 12px; text-align: center; font-size: 1.05rem; font-family: var(--sans); font-weight: 700; }
    .summary-row {
      display: grid; grid-template-columns: 84px 1fr; gap: 10px; padding: 8px 2px;
      border-top: 1px solid rgba(111, 79, 49, 0.18); font-family: var(--sans); font-size: 0.98rem; align-items: start;
    }
    .summary-row strong { color: #5d4938; }
    .preview-wrap {
      margin-top: 10px; border: 2px solid #dfd0bc; background: #eee5d2; border-radius: 10px;
      min-height: 138px; display: flex; align-items: center; justify-content: center;
      overflow: hidden; color: rgba(91, 70, 54, 0.75); font-family: var(--sans); font-size: 0.95rem; text-align: center; padding: 8px;
    }
    .preview-wrap img { width: 100%; display: block; object-fit: cover; max-height: 220px; }
    .decision { width: min(100%, 245px); margin: 12px auto 0; display: grid; gap: 10px; }
    .decision-text { text-align: center; font-size: 1rem; font-family: var(--sans); margin: 2px 0 0; }
    #camera-input { display: none; }
    .step-result h1 { margin-bottom: 14px; }
    .result-sheet { text-align: center; padding: 18px 14px; }
    .result-sheet p + p { margin-top: 10px; opacity: 0.88; font-size: 0.95rem; }
    @media (max-width: 430px) {
      body { padding: 0; }
      .phone-shell { width: 100%; min-height: 100vh; border-radius: 0; padding: 0; }
      .phone-shell::before, .phone-shell::after { display: none; }
      .phone-screen {
        min-height: 100vh; border-radius: 0;
        padding-top: calc(20px + env(safe-area-inset-top));
        padding-bottom: calc(22px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <div class="phone-screen">
      <div class="inner">
        <div class="app-note">Skroja aktivitetshanterare</div>
        <section id="step-user" class="step active">
          <h1>Vem är du?</h1>
          <div class="rule"></div>
          <div class="button-grid" id="user-buttons"></div>
        </section>
        <section id="step-activity" class="step step-activity">
          <h1>Vad gör du?</h1>
          <div class="rule"></div>
          <div class="button-grid" id="activity-buttons"></div>
          <div class="field-wrap">
            <label class="field-label" for="custom-activity">Annan aktivitet</label>
            <input id="custom-activity" type="text" placeholder="Skriv aktivitet här" maxlength="80" />
          </div>
          <div class="stack">
            <button class="action" id="activity-continue">Fortsätt</button>
            <button class="secondary" id="activity-back">Tillbaka</button>
          </div>
        </section>
        <section id="step-photo" class="step">
          <h1>Vill du ta en bild?</h1>
          <div class="rule"></div>
          <div class="question-card">
            <p>Om du väljer <strong>Ja</strong> öppnas kameran direkt på mobilen.</p>
            <div class="camera-actions">
              <button class="choice green" id="photo-yes">Ja</button>
              <button class="choice coral" id="photo-no">Nej</button>
            </div>
          </div>
          <input id="camera-input" type="file" accept="image/*" capture="environment" />
          <div class="stack">
            <button class="secondary" id="photo-back">Tillbaka</button>
          </div>
        </section>
        <section id="step-summary" class="step">
          <h1>Sammanställning</h1>
          <div class="rule"></div>
          <div class="summary-sheet">
            <div class="summary-title">Arbetskort</div>
            <div class="summary-row"><strong>Namn</strong><span id="summary-user"></span></div>
            <div class="summary-row"><strong>Aktivitet</strong><span id="summary-activity"></span></div>
            <div class="summary-row"><strong>Tid</strong><span id="summary-time"></span></div>
            <div class="summary-row"><strong>Bild</strong><span id="summary-image-text"></span></div>
            <div class="preview-wrap" id="preview-wrap"><span>Ingen bild vald</span></div>
          </div>
          <div class="decision">
            <div class="decision-text">Skicka till dashboard?</div>
            <button class="choice yellow" id="send-yes">Ja, skicka</button>
            <button class="secondary" id="send-no">Nej, börja om</button>
          </div>
        </section>
        <section id="step-result" class="step step-result">
          <h1 id="result-title">Klart</h1>
          <div class="rule"></div>
          <div class="result-sheet">
            <p id="result-message"></p>
            <p id="result-submessage"></p>
          </div>
          <div class="stack">
            <button class="choice green" id="start-over">Ny registrering</button>
          </div>
        </section>
      </div>
    </div>
  </div>
  <script>
    const members = [
      { name: 'Camilla', color: 'blue' },
      { name: 'Christina', color: 'green' },
      { name: 'Maria', color: 'coral' }
    ];
    const activityOptions = [
      { name: 'Glasyr 1', color: 'yellow' },
      { name: 'Glasyr 2', color: 'blue' },
      { name: 'Glasyr 3', color: 'green' },
      { name: 'Torkning', color: 'yellow' }
    ];
    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };
    const state = { member: '', activity: '', photoFile: null, photoDataUrl: '', timestampIso: '' };
    const steps = {
      user: document.getElementById('step-user'),
      activity: document.getElementById('step-activity'),
      photo: document.getElementById('step-photo'),
      summary: document.getElementById('step-summary'),
      result: document.getElementById('step-result')
    };
    const userButtons = document.getElementById('user-buttons');
    const activityButtons = document.getElementById('activity-buttons');
    const customActivityInput = document.getElementById('custom-activity');
    const cameraInput = document.getElementById('camera-input');
    const previewWrap = document.getElementById('preview-wrap');

    function showStep(name) {
      Object.values(steps).forEach(step => step.classList.remove('active'));
      steps[name].classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function renderButtons() {
      userButtons.innerHTML = '';
      activityButtons.innerHTML = '';
      members.forEach(member => {
        const button = document.createElement('button');
        button.className = `choice ${member.color}`;
        button.textContent = member.name;
        button.addEventListener('click', () => { state.member = member.name; showStep('activity'); });
        userButtons.appendChild(button);
      });
      activityOptions.forEach(activity => {
        const button = document.createElement('button');
        button.className = `choice ${activity.color}`;
        button.textContent = activity.name;
        button.addEventListener('click', () => {
          state.activity = activity.name;
          customActivityInput.value = '';
          showStep('photo');
        });
        activityButtons.appendChild(button);
      });
    }
    function setResult(title, message, submessage = '') {
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-message').textContent = message;
      document.getElementById('result-submessage').textContent = submessage;
      showStep('result');
    }
    function resetState() {
      state.member = '';
      state.activity = '';
      state.photoFile = null;
      state.photoDataUrl = '';
      state.timestampIso = '';
      customActivityInput.value = '';
      cameraInput.value = '';
      previewWrap.innerHTML = '<span>Ingen bild vald</span>';
      showStep('user');
    }
    function timestampBase() {
      const d = new Date();
      const pad = value => String(value).padStart(2, '0');
      return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    }
    function formatSwedish(isoString) {
      return new Date(isoString).toLocaleString('sv-SE', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    function updateSummary() {
      state.timestampIso = new Date().toISOString();
      const hasImage = Boolean(state.photoFile);
      document.getElementById('summary-user').textContent = state.member;
      document.getElementById('summary-activity').textContent = state.activity;
      document.getElementById('summary-time').textContent = formatSwedish(state.timestampIso);
      document.getElementById('summary-image-text').textContent = hasImage ? 'Bild vald' : 'Ingen bild';
      if (hasImage && state.photoDataUrl) {
        previewWrap.innerHTML = `<img src="${state.photoDataUrl}" alt="Förhandsvisning" />`;
      } else {
        previewWrap.innerHTML = '<span>Ingen bild vald</span>';
      }
    }
    async function uploadToAzure() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i filen först.');
      }
      const query = sasToken.replace(/^\?/, '');
      const baseUrl = `https://${accountName}.blob.core.windows.net/${containerName}`;
      const baseName = timestampBase();
      const jsonName = `${baseName}.json`;
      const jpgName = `${baseName}.jpg`;
      const payload = {
        timestamp: state.timestampIso,
        member: state.member,
        activity: state.activity,
        hasImage: Boolean(state.photoFile),
        imageFileName: state.photoFile ? jpgName : null,
        jsonFileName: jsonName,
        source: 'SkrojaAktivitet'
      };
      const jsonUrl = `${baseUrl}/${encodeURIComponent(jsonName)}?${query}`;
      const jsonResponse = await fetch(jsonUrl, {
        method: 'PUT',
        headers: {
          'x-ms-blob-type': 'BlockBlob',
          'x-ms-version': '2023-11-03',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload, null, 2)
      });
      if (!jsonResponse.ok) {
        const text = await jsonResponse.text().catch(() => '');
        throw new Error(`Kunde inte ladda upp JSON (${jsonResponse.status}). ${text}`);
      }
      if (state.photoFile) {
        const imageUrl = `${baseUrl}/${encodeURIComponent(jpgName)}?${query}`;
        const imageResponse = await fetch(imageUrl, {
          method: 'PUT',
          headers: {
            'x-ms-blob-type': 'BlockBlob',
            'x-ms-version': '2023-11-03',
            'Content-Type': state.photoFile.type || 'image/jpeg'
          },
          body: state.photoFile
        });
        if (!imageResponse.ok) {
          const text = await imageResponse.text().catch(() => '');
          throw new Error(`Kunde inte ladda upp bild (${imageResponse.status}). ${text}`);
        }
      }
      return { jsonName, jpgName: state.photoFile ? jpgName : null };
    }
    document.getElementById('activity-continue').addEventListener('click', () => {
      const manualText = customActivityInput.value.trim();
      if (manualText) state.activity = manualText;
      if (!state.activity) { alert('Välj eller skriv en aktivitet först.'); return; }
      showStep('photo');
    });
    document.getElementById('activity-back').addEventListener('click', () => showStep('user'));
    document.getElementById('photo-back').addEventListener('click', () => showStep('activity'));
    document.getElementById('photo-yes').addEventListener('click', () => cameraInput.click());
    document.getElementById('photo-no').addEventListener('click', () => {
      state.photoFile = null;
      state.photoDataUrl = '';
      updateSummary();
      showStep('summary');
    });
    cameraInput.addEventListener('change', event => {
      const [file] = event.target.files || [];
      if (!file) { updateSummary(); showStep('summary'); return; }
      state.photoFile = file;
      const reader = new FileReader();
      reader.onload = () => {
        state.photoDataUrl = reader.result;
        updateSummary();
        showStep('summary');
      };
      reader.readAsDataURL(file);
    });
    document.getElementById('send-no').addEventListener('click', resetState);
    document.getElementById('send-yes').addEventListener('click', async () => {
      try {
        setResult('Skickar...', 'Uppladdning pågår.', 'Lämna sidan öppen tills uppladdningen är klar.');
        const result = await uploadToAzure();
        setResult('Klart', `Registreringen skickades till dashboarden.${result.jpgName ? ' Bilden följde med.' : ''}`,
          `JSON: ${result.jsonName}${result.jpgName ? ` | Bild: ${result.jpgName}` : ''}`);
      } catch (error) {
        console.error(error);
        setResult('Det gick inte', error.message || 'Något gick fel vid uppladdning.');
      }
    });
    document.getElementById('start-over').addEventListener('click', resetState);
    renderButtons();
  </script>
</body>
</html>

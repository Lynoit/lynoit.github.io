<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skroja statistik</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#151c2f;
      --panel-2:#1b243b;
      --border:#2a3555;
      --text:#eef3ff;
      --muted:#a9b5d1;
      --accent:#5b8cff;
      --accent-2:#7fd1b9;
      --accent-3:#f5b971;
      --accent-4:#d08cff;
      --danger:#ff7b7b;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
      --font:Inter, "Segoe UI", Arial, sans-serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(91,140,255,.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(127,209,185,.14), transparent 25%),
        var(--bg);
      color:var(--text);
      font-family:var(--font);
    }

    .app{
      max-width:1600px;
      margin:0 auto;
      padding:20px;
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:16px;
      min-height:100vh;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:18px 20px;
      background:rgba(21,28,47,.88);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }

    .title-wrap h1{
      margin:0;
      font-size:1.8rem;
      font-weight:700;
      letter-spacing:.2px;
    }

    .filters{
      display:grid;
      grid-template-columns:1fr auto auto auto;
      gap:12px;
      padding:14px;
      background:rgba(21,28,47,.88);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      align-items:center;
    }

    .filter-group{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .filter-label{
      color:var(--muted);
      font-size:.9rem;
      margin-right:4px;
    }

    button, select{
      border:none;
      outline:none;
      border-radius:10px;
      padding:10px 14px;
      font-size:.95rem;
      font-family:inherit;
    }

    button{
      cursor:pointer;
      background:var(--panel-2);
      color:var(--text);
      border:1px solid var(--border);
      transition:.18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      border-color:#40507d;
    }

    button.active{
      background:linear-gradient(180deg, #5e8eff, #4e77d7);
      border-color:#6996ff;
    }

    select{
      background:var(--panel-2);
      color:var(--text);
      border:1px solid var(--border);
      min-width:160px;
    }

    .content{
      display:grid;
      grid-template-columns: 520px 1fr;
      gap:16px;
      min-height:0;
    }

    .panel{
      background:rgba(21,28,47,.92);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      min-height:0;
      overflow:hidden;
    }

    .panel-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:16px 18px;
      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,.02);
    }

    .panel-header h2{
      margin:0;
      font-size:1.15rem;
    }

    .panel-header .meta{
      color:var(--muted);
      font-size:.9rem;
    }

    .log-wrap{
      display:flex;
      flex-direction:column;
      min-height:0;
      height:100%;
    }

    .table-container{
      overflow:auto;
      height:100%;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:.93rem;
    }

    thead th{
      position:sticky;
      top:0;
      z-index:1;
      background:#1b243b;
      color:#dce6ff;
      text-align:left;
      padding:12px 14px;
      border-bottom:1px solid var(--border);
    }

    tbody td{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.05);
      color:#edf2ff;
      vertical-align:top;
    }

    tbody tr:hover{
      background:rgba(255,255,255,.035);
    }

    .user-pill{
      display:inline-flex;
      align-items:center;
      padding:4px 9px;
      border-radius:999px;
      background:#202b45;
      border:1px solid #334262;
      font-size:.83rem;
      white-space:nowrap;
    }

    .right-grid{
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:16px;
      padding:16px;
      height:100%;
      min-height:0;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:12px;
    }

    .stat-card{
      padding:14px;
      border:1px solid var(--border);
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .stat-label{
      color:var(--muted);
      font-size:.85rem;
      margin-bottom:10px;
    }

    .stat-value{
      font-size:1.7rem;
      font-weight:700;
      line-height:1;
    }

    .charts-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
      min-height:280px;
    }

    .chart-card, .overview-card{
      border:1px solid var(--border);
      border-radius:14px;
      background:rgba(255,255,255,.02);
      padding:14px 14px 10px;
      min-height:0;
    }

    .chart-card h3, .overview-card h3{
      margin:0 0 10px;
      font-size:1rem;
    }

    .chart-wrap{
      position:relative;
      height:240px;
    }

    .overview-card{
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .overview-switch{
      display:flex;
      gap:8px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .overview-body{
      min-height:0;
      overflow:auto;
      border:1px solid rgba(255,255,255,.05);
      border-radius:12px;
      padding:10px;
      background:rgba(0,0,0,.12);
    }

    .calendar-grid{
      display:grid;
      gap:8px;
    }

    .calendar-header{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:6px;
      margin-bottom:6px;
    }

    .weekday{
      text-align:center;
      color:var(--muted);
      font-size:.82rem;
      padding:4px 0;
    }

    .calendar-days{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:6px;
    }

    .day-cell{
      min-height:58px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.06);
      padding:7px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      font-size:.85rem;
      background:#172036;
    }

    .day-cell.empty{
      opacity:.25;
    }

    .day-top{
      display:flex;
      justify-content:space-between;
      gap:8px;
    }

    .day-number{
      font-weight:600;
    }

    .day-count{
      font-size:.78rem;
      color:#d7e1ff;
    }

    .legend{
      display:flex;
      gap:8px;
      align-items:center;
      margin-top:10px;
      color:var(--muted);
      font-size:.82rem;
      flex-wrap:wrap;
    }

    .legend-scale{
      display:flex;
      gap:4px;
      align-items:center;
    }

    .legend-box{
      width:16px;
      height:16px;
      border-radius:4px;
      border:1px solid rgba(255,255,255,.08);
    }

    .year-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
    }

    .month-box{
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
      padding:8px;
      background:#172036;
    }

    .month-title{
      font-size:.88rem;
      margin-bottom:8px;
      color:#dce6ff;
    }

    .mini-days{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:3px;
    }

    .mini-cell{
      aspect-ratio:1;
      border-radius:4px;
      border:1px solid rgba(255,255,255,.04);
      background:#202a44;
    }

    .status-line{
      color:var(--muted);
      font-size:.88rem;
    }

    .error{
      color:var(--danger);
    }

    @media (max-width: 1280px){
      .content{ grid-template-columns:1fr; }
      .stats-grid{ grid-template-columns:repeat(2,1fr); }
    }

    @media (max-width: 760px){
      .filters{
        grid-template-columns:1fr;
      }
      .stats-grid{ grid-template-columns:1fr; }
      .year-grid{ grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
<section class="topbar">
  <div class="title-wrap">
    <h1>Aktivitet och närvaro</h1>
  </div>

  <div class="filter-group">
    <button id="exportExcelBtn">Exportera till Excel</button>
  </div>
</section>

    <section class="filters">
      <div class="filter-group">
        <span class="filter-label">Period:</span>
        <button class="period-btn active" data-period="7d">7 dagar</button>
        <button class="period-btn" data-period="30d">30 dagar</button>
        <button class="period-btn" data-period="month">Månad</button>
        <button class="period-btn" data-period="year">År</button>
      </div>

      <div class="filter-group">
        <span class="filter-label">Användare:</span>
        <select id="userSelect"></select>
      </div>

      <div class="filter-group">
        <span class="filter-label">Översikt:</span>
        <button class="overview-btn active" data-overview="month">Månadsöversikt</button>
        <button class="overview-btn" data-overview="year">Årsöversikt</button>
      </div>

      <div class="filter-group" style="justify-content:flex-end;">
        <span id="statusLine" class="status-line">Laddar data...</span>
      </div>
    </section>

    <section class="content">
      <section class="panel log-wrap">
        <div class="panel-header">
          <h2>Aktivitetslogg</h2>
          <div class="meta" id="logMeta">-</div>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width:180px;">Timestamp</th>
                <th style="width:150px;">Användare</th>
                <th>Aktivitet</th>
              </tr>
            </thead>
            <tbody id="logTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="right-grid">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Totala aktiviteter</div>
              <div class="stat-value" id="statActivities">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Check-ins</div>
              <div class="stat-value" id="statCheckins">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Unika användare</div>
              <div class="stat-value" id="statUsers">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Närvarodagar</div>
              <div class="stat-value" id="statPresenceDays">0</div>
            </div>
          </div>

          <div class="charts-grid">
            <div class="chart-card">
              <h3 id="barChartTitle">Närvarodagar per användare</h3>
              <div class="chart-wrap">
                <canvas id="summaryChart"></canvas>
              </div>
            </div>
          </div>

          <div class="overview-card">
            <h3 id="overviewTitle">Månadsöversikt</h3>
            <div class="overview-switch">
              <button class="overview-btn active" data-overview="month">Månadsöversikt</button>
              <button class="overview-btn" data-overview="year">Årsöversikt</button>
            </div>
            <div class="overview-body" id="overviewBody"></div>
          </div>
        </div>
      </section>
    </section>
  </div>

  <script>
    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };

    const hiddenActivities = [];
    const pollIntervalMs = 5000;
    const excludedRightSideUsers = ['Lerverkstan'];

const state = {
  rawRecords: [],
  users: [],
  rightSideUsers: [],
  selectedUser: 'Alla',
  period: '7d',
  overview: 'month',
  summaryChart: null,
  lastLoadedAt: null
};

    const userColors = {
      Camilla: '#5b8cff',
      Christina: '#7bc96f',
      Maria: '#f5a742',
      Lerverkstan: '#c77dff'
    };

    function getUserColor(name, alpha = 1) {
      const hex = userColors[name] || '#7fd1b9';
      if (alpha === 1) return hex;
      const bigint = parseInt(hex.slice(1), 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function formatDateTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatDateOnly(date) {
      return date.toLocaleDateString('sv-SE', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      });
    }

    function startOfDay(date) {
      const d = new Date(date);
      d.setHours(0,0,0,0);
      return d;
    }

    function isCheckin(record) {
      return (record.activity || '').trim().toLowerCase() === 'checka in'
          || (record.activity || '').trim().toLowerCase() === 'checkade in'
          || (record.activity || '').trim().toLowerCase() === 'check-in';
    }

    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

function getStatsForExport(records) {
  const rightSideRecords = records.filter(r => !excludedRightSideUsers.includes(r.member));
  const checkins = getCheckinRecords(rightSideRecords);
  const uniqueUsers = new Set(rightSideRecords.map(r => r.member)).size;
  const presenceDays = new Set(
    checkins.map(r => `${r.member}__${formatDateOnly(startOfDay(new Date(r.timestamp)))}`)
  ).size;

  return [
    { Nyckeltal: 'Totala aktiviteter', Varde: rightSideRecords.length },
    { Nyckeltal: 'Check-ins', Varde: checkins.length },
    { Nyckeltal: 'Unika användare', Varde: uniqueUsers },
    { Nyckeltal: 'Närvarodagar', Varde: presenceDays },
    { Nyckeltal: 'Vald period', Varde: state.period },
    { Nyckeltal: 'Vald användare', Varde: state.selectedUser },
    { Nyckeltal: 'Vald översikt', Varde: state.overview }
  ];
}

function getSummaryRowsForExport(records) {
  const chartData = buildSummaryChartData(records);
  return chartData.labels.map((label, index) => ({
    Etikett: label,
    Varde: chartData.datasets[0]?.data?.[index] ?? 0,
    Serie: chartData.datasets[0]?.label ?? ''
  }));
}

function getMonthOverviewRowsForExport(records) {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const userForCalendar = state.selectedUser === 'Alla' ? 'Alla' : state.selectedUser;
  const counts = countCheckinsForUserByDay(records, userForCalendar);

  const rows = [];
  const lastDay = new Date(year, month + 1, 0).getDate();

  for (let day = 1; day <= lastDay; day++) {
    const date = new Date(year, month, day);
    const key = formatDateOnly(date);
    rows.push({
      Datum: key,
      Anvandare: userForCalendar,
      Checkins: counts[key] || 0
    });
  }

  return rows;
}

function getYearOverviewRowsForExport(records) {
  const now = new Date();
  const year = now.getFullYear();
  const userForCalendar = state.selectedUser === 'Alla' ? 'Alla' : state.selectedUser;
  const counts = countCheckinsForUserByDay(records, userForCalendar);

  const rows = [];

  for (let month = 0; month < 12; month++) {
    const lastDay = new Date(year, month + 1, 0).getDate();

    for (let day = 1; day <= lastDay; day++) {
      const date = new Date(year, month, day);
      const key = formatDateOnly(date);

      rows.push({
        Datum: key,
        Manad: new Date(year, month, 1).toLocaleDateString('sv-SE', { month: 'long' }),
        Anvandare: userForCalendar,
        Checkins: counts[key] || 0
      });
    }
  }

  return rows;
}

function autoFitColumns(worksheet, rows) {
  if (!rows || !rows.length) return;

  const keys = Object.keys(rows[0]);
  const colWidths = keys.map(key => ({
    wch: Math.max(
      key.length,
      ...rows.map(row => String(row[key] ?? '').length)
    ) + 2
  }));

  worksheet['!cols'] = colWidths;
}

function exportToExcel() {
  if (!state.rawRecords || !state.rawRecords.length) {
    alert('Det finns ingen data att exportera.');
    return;
  }

  const workbook = XLSX.utils.book_new();

  const allRows = state.rawRecords.map(record => ({
    Timestamp: formatDateTime(record.timestamp),
    TimestampISO: record.timestamp,
    Anvandare: record.member,
    Aktivitet: record.activity
  }));

  const filteredRecords = getFilteredRecords();

  const logRows = filteredRecords.map(record => ({
    Timestamp: formatDateTime(record.timestamp),
    TimestampISO: record.timestamp,
    Anvandare: record.member,
    Aktivitet: record.activity
  }));

  const statsRows = getStatsForExport(filteredRecords);
  const summaryRows = getSummaryRowsForExport(filteredRecords);

  const overviewRows =
    state.overview === 'month'
      ? getMonthOverviewRowsForExport(filteredRecords)
      : getYearOverviewRowsForExport(filteredRecords);

  const sheets = [
    { name: 'All data', rows: allRows },
    { name: 'Aktivitetslogg', rows: logRows },
    { name: 'Statistik', rows: statsRows },
    { name: 'Diagramdata', rows: summaryRows },
    { name: state.overview === 'month' ? 'Manadsoversikt' : 'Arsoversikt', rows: overviewRows }
  ];

  sheets.forEach(sheet => {
    const rows = sheet.rows.length ? sheet.rows : [{ Info: 'Ingen data' }];
    const worksheet = XLSX.utils.json_to_sheet(rows);
    autoFitColumns(worksheet, rows);
    XLSX.utils.book_append_sheet(workbook, worksheet, sheet.name);
  });

  const now = new Date();
  const fileStamp = now.toISOString().slice(0, 19).replace(/[:T]/g, '-');
  const fileName = `aktivitet-och-narvaro-${fileStamp}.xlsx`;

  XLSX.writeFile(workbook, fileName);
}

    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token.');
      }

      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);

      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob'));

      return blobNodes
        .map(blob => ({
          name: blob.querySelector('Name')?.textContent || '',
          lastModified: blob.querySelector('Properties > Last-Modified')?.textContent || ''
        }))
        .filter(blob => blob.name.endsWith('.json'));
    }

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }

    async function loadActivities() {
      const files = await listJsonBlobs();
      const sortedFiles = files
        .slice()
        .sort((a, b) => {
          const ta = new Date(a.lastModified).getTime() || 0;
          const tb = new Date(b.lastModified).getTime() || 0;
          return tb - ta;
        });

      const recentFiles = sortedFiles.slice(0, 500).map(file => file.name);
      const records = await Promise.all(recentFiles.map(readJsonRecord));

      const cleaned = records
        .filter(r => r && r.member && r.timestamp)
        .filter(r => !hiddenActivities.includes(r.activity))
        .map(r => ({
          timestamp: r.timestamp,
          member: r.member,
          activity: r.activity || 'Okänd aktivitet'
        }))
        .filter(r => !Number.isNaN(new Date(r.timestamp).getTime()))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

state.rawRecords = cleaned;
state.users = [...new Set(cleaned.map(r => r.member))].sort((a, b) => a.localeCompare(b, 'sv'));
state.rightSideUsers = state.users.filter(user => !excludedRightSideUsers.includes(user));
state.lastLoadedAt = new Date();

      populateUserSelect();
      renderDashboard();
      setStatus(`Senast uppdaterad ${formatDateTime(state.lastLoadedAt.toISOString())}`);
    }

function populateUserSelect() {
  const select = document.getElementById('userSelect');
  const previous = state.selectedUser;
  select.innerHTML = '';

  const allOption = document.createElement('option');
  allOption.value = 'Alla';
  allOption.textContent = 'Alla';
  select.appendChild(allOption);

  state.rightSideUsers.forEach(user => {
    const opt = document.createElement('option');
    opt.value = user;
    opt.textContent = user;
    select.appendChild(opt);
  });

  if ([...select.options].some(o => o.value === previous)) {
    select.value = previous;
  } else {
    select.value = 'Alla';
    state.selectedUser = 'Alla';
  }
}

    function getPeriodRange() {
      const now = new Date();
      const end = new Date(now);
      const start = new Date(now);

      if (state.period === '7d') {
        start.setDate(start.getDate() - 6);
        return { start: startOfDay(start), end };
      }

      if (state.period === '30d') {
        start.setDate(start.getDate() - 29);
        return { start: startOfDay(start), end };
      }

      if (state.period === 'month') {
        return {
          start: new Date(now.getFullYear(), now.getMonth(), 1),
          end
        };
      }

      return {
        start: new Date(now.getFullYear(), 0, 1),
        end
      };
    }

function getFilteredRecords() {
  const { start, end } = getPeriodRange();
  return state.rawRecords.filter(record => {
    const ts = new Date(record.timestamp);
    if (ts < start || ts > end) return false;

    if (state.selectedUser !== 'Alla' && record.member !== state.selectedUser) {
      return false;
    }

    return true;
  });
}

    function getCheckinRecords(records) {
      return records.filter(isCheckin);
    }

function buildSummaryChartData(records) {
  const checkins = getCheckinRecords(records).filter(
    record => !excludedRightSideUsers.includes(record.member)
  );

  if (state.selectedUser === 'Alla') {
    const daysPerUser = {};
    state.rightSideUsers.forEach(user => { daysPerUser[user] = new Set(); });

    checkins.forEach(record => {
      const dayKey = formatDateOnly(startOfDay(new Date(record.timestamp)));
      if (!daysPerUser[record.member]) daysPerUser[record.member] = new Set();
      daysPerUser[record.member].add(dayKey);
    });

    return {
      title: 'Närvarodagar per användare',
      labels: state.rightSideUsers,
      datasets: [{
        label: 'Närvarodagar',
        data: state.rightSideUsers.map(user => daysPerUser[user]?.size || 0),
        backgroundColor: state.rightSideUsers.map(user => getUserColor(user, 0.8)),
        borderColor: state.rightSideUsers.map(user => getUserColor(user, 1)),
        borderWidth: 1,
        borderRadius: 6
      }]
    };
  }

  const dailyCount = {};
  checkins
    .filter(record => record.member === state.selectedUser)
    .forEach(record => {
      const dayKey = formatDateOnly(startOfDay(new Date(record.timestamp)));
      dailyCount[dayKey] = (dailyCount[dayKey] || 0) + 1;
    });

  const labels = Object.keys(dailyCount).sort();
  return {
    title: `Check-ins för ${state.selectedUser}`,
    labels,
    datasets: [{
      label: 'Check-ins',
      data: labels.map(label => dailyCount[label]),
      backgroundColor: getUserColor(state.selectedUser, 0.8),
      borderColor: getUserColor(state.selectedUser, 1),
      borderWidth: 1,
      borderRadius: 6
    }]
  };
}

    function renderLogTable(records) {
      const tbody = document.getElementById('logTableBody');
      const logMeta = document.getElementById('logMeta');
      tbody.innerHTML = '';

      const topRecords = records.slice(0, 250);
      logMeta.textContent = `${topRecords.length} visade / ${records.length} träffar`;

      if (!topRecords.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="3" style="color:var(--muted);">Ingen data för valt urval.</td>`;
        tbody.appendChild(tr);
        return;
      }

      topRecords.forEach(record => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${formatDateTime(record.timestamp)}</td>
          <td><span class="user-pill">${record.member}</span></td>
          <td>${record.activity}</td>
        `;
        tbody.appendChild(tr);
      });
    }

function updateStats(records) {
  const rightSideRecords = records.filter(r => !excludedRightSideUsers.includes(r.member));
  const checkins = getCheckinRecords(rightSideRecords);
  const uniqueUsers = new Set(rightSideRecords.map(r => r.member)).size;
  const presenceDays = new Set(
    checkins.map(r => `${r.member}__${formatDateOnly(startOfDay(new Date(r.timestamp)))}`)
  ).size;

  document.getElementById('statActivities').textContent = rightSideRecords.length;
  document.getElementById('statCheckins').textContent = checkins.length;
  document.getElementById('statUsers').textContent = uniqueUsers;
  document.getElementById('statPresenceDays').textContent = presenceDays;
}

    function destroyCharts() {
      if (state.summaryChart) state.summaryChart.destroy();
    }

    function renderCharts(records) {
      destroyCharts();

      const summaryData = buildSummaryChartData(records);
      document.getElementById('barChartTitle').textContent = summaryData.title;

      state.summaryChart = new Chart(document.getElementById('summaryChart'), {
        type: 'bar',
        data: {
          labels: summaryData.labels,
          datasets: summaryData.datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: '#dfe7ff' }
            }
          },
          scales: {
            x: {
              ticks: { color: '#c6d2ef' },
              grid: { color: 'rgba(255,255,255,.05)' }
            },
            y: {
              beginAtZero: true,
              ticks: { color: '#c6d2ef', precision: 0 },
              grid: { color: 'rgba(255,255,255,.08)' }
            }
          }
        }
      });
    }

function countCheckinsForUserByDay(records, user) {
  const result = {};
  const checkins = getCheckinRecords(records).filter(r => {
    if (excludedRightSideUsers.includes(r.member)) return false;
    if (user !== 'Alla' && r.member !== user) return false;
    return true;
  });

  checkins.forEach(record => {
    const date = new Date(record.timestamp);
    const key = formatDateOnly(startOfDay(date));
    result[key] = (result[key] || 0) + 1;
  });

  return result;
}

    function getIntensityColor(count, maxCount) {
      if (!count) return '#18223a';
      const ratio = maxCount <= 0 ? 0 : count / maxCount;
      if (ratio < 0.25) return '#244b7a';
      if (ratio < 0.5) return '#2d6aa7';
      if (ratio < 0.75) return '#3d8fd9';
      return '#6dc0ff';
    }

    function renderMonthOverview(records) {
      const container = document.getElementById('overviewBody');
      const title = document.getElementById('overviewTitle');
      container.innerHTML = '';
      title.textContent = 'Månadsöversikt';

      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startWeekday = (firstDay.getDay() + 6) % 7;

      const userForCalendar = state.selectedUser === 'Alla' ? 'Alla' : state.selectedUser;
      const counts = countCheckinsForUserByDay(records, userForCalendar);
      const maxCount = Math.max(0, ...Object.values(counts));

      const calendar = document.createElement('div');
      calendar.className = 'calendar-grid';

      const caption = document.createElement('div');
      caption.style.marginBottom = '8px';
      caption.style.color = '#dce6ff';
      caption.style.fontWeight = '600';
      caption.textContent = `${userForCalendar} — ${now.toLocaleDateString('sv-SE', { month: 'long', year: 'numeric' })}`;
      calendar.appendChild(caption);

      const header = document.createElement('div');
      header.className = 'calendar-header';
      ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'].forEach(day => {
        const el = document.createElement('div');
        el.className = 'weekday';
        el.textContent = day;
        header.appendChild(el);
      });
      calendar.appendChild(header);

      const days = document.createElement('div');
      days.className = 'calendar-days';

      for (let i = 0; i < startWeekday; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell empty';
        days.appendChild(empty);
      }

      for (let day = 1; day <= lastDay.getDate(); day++) {
        const date = new Date(year, month, day);
        const key = formatDateOnly(date);
        const count = counts[key] || 0;

        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.style.background = getIntensityColor(count, maxCount);
        cell.innerHTML = `
          <div class="day-top">
            <span class="day-number">${day}</span>
            <span class="day-count">${count > 0 ? count : ''}</span>
          </div>
          <div style="font-size:.76rem;color:#dce6ff;">${count ? 'check-ins' : ''}</div>
        `;
        days.appendChild(cell);
      }

      calendar.appendChild(days);

      const legend = document.createElement('div');
      legend.className = 'legend';
      legend.innerHTML = `
        <span>Färg = antal check-ins</span>
        <div class="legend-scale">
          <span>Låg</span>
          <span class="legend-box" style="background:#244b7a;"></span>
          <span class="legend-box" style="background:#2d6aa7;"></span>
          <span class="legend-box" style="background:#3d8fd9;"></span>
          <span class="legend-box" style="background:#6dc0ff;"></span>
          <span>Hög</span>
        </div>
      `;
      calendar.appendChild(legend);

      container.appendChild(calendar);
    }

    function renderYearOverview(records) {
      const container = document.getElementById('overviewBody');
      const title = document.getElementById('overviewTitle');
      container.innerHTML = '';
      title.textContent = 'Årsöversikt';

      const now = new Date();
      const year = now.getFullYear();
      const userForCalendar = state.selectedUser === 'Alla' ? 'Alla' : state.selectedUser;
      const counts = countCheckinsForUserByDay(records, userForCalendar);
      const maxCount = Math.max(0, ...Object.values(counts));

      const titleEl = document.createElement('div');
      titleEl.style.marginBottom = '10px';
      titleEl.style.color = '#dce6ff';
      titleEl.style.fontWeight = '600';
      titleEl.textContent = `${userForCalendar} — ${year}`;
      container.appendChild(titleEl);

      const grid = document.createElement('div');
      grid.className = 'year-grid';

      for (let month = 0; month < 12; month++) {
        const box = document.createElement('div');
        box.className = 'month-box';

        const monthTitle = document.createElement('div');
        monthTitle.className = 'month-title';
        monthTitle.textContent = new Date(year, month, 1).toLocaleDateString('sv-SE', { month: 'long' });
        box.appendChild(monthTitle);

        const mini = document.createElement('div');
        mini.className = 'mini-days';

        const lastDay = new Date(year, month + 1, 0).getDate();
        for (let day = 1; day <= 31; day++) {
          const cell = document.createElement('div');
          cell.className = 'mini-cell';

          if (day <= lastDay) {
            const key = formatDateOnly(new Date(year, month, day));
            const count = counts[key] || 0;
            cell.style.background = getIntensityColor(count, maxCount);
            cell.title = `${key}: ${count} check-ins`;
          } else {
            cell.style.opacity = '.18';
          }

          mini.appendChild(cell);
        }

        box.appendChild(mini);
        grid.appendChild(box);
      }

      container.appendChild(grid);

      const legend = document.createElement('div');
      legend.className = 'legend';
      legend.innerHTML = `
        <span>Årsheatmap</span>
        <div class="legend-scale">
          <span>Låg</span>
          <span class="legend-box" style="background:#244b7a;"></span>
          <span class="legend-box" style="background:#2d6aa7;"></span>
          <span class="legend-box" style="background:#3d8fd9;"></span>
          <span class="legend-box" style="background:#6dc0ff;"></span>
          <span>Hög</span>
        </div>
      `;
      container.appendChild(legend);
    }

    function renderOverview(records) {
      if (state.overview === 'month') {
        renderMonthOverview(records);
      } else {
        renderYearOverview(records);
      }
    }

    function renderDashboard() {
      const records = getFilteredRecords();
      renderLogTable(records);
      updateStats(records);
      renderCharts(records);
      renderOverview(records);
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById('statusLine');
      el.textContent = message;
      el.classList.toggle('error', isError);
    }

    function bindEvents() {
      document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.period = btn.dataset.period;
          renderDashboard();
        });
      });

      document.querySelectorAll('.overview-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.overview = btn.dataset.overview;
          document.querySelectorAll('.overview-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.overview === state.overview);
          });
          renderDashboard();
        });

      document.getElementById('exportExcelBtn').addEventListener('click', () => {
  exportToExcel();
        });  
      });

      document.getElementById('userSelect').addEventListener('change', (e) => {
        state.selectedUser = e.target.value;
        renderDashboard();
      });
    }

    async function init() {
      bindEvents();

      try {
        await loadActivities();
      } catch (error) {
        console.error(error);
        setStatus(error.message || 'Kunde inte ladda data.', true);
      }

      setInterval(async () => {
        try {
          await loadActivities();
        } catch (error) {
          console.error(error);
          setStatus(error.message || 'Kunde inte uppdatera data.', true);
        }
      }, pollIntervalMs);
    }

    init();
  </script>
</body>
</html>

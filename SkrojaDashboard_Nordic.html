<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skröja Anslagstavla</title>
  <style>
    :root{
      --bg:#f5f3ef;
      --bg-2:#ece8e2;
      --surface:#ffffff;
      --surface-2:#f7f5f2;
      --surface-3:#efebe5;
      --line:#ddd6cd;
      --line-soft:#e9e4de;
      --text:#2f2c28;
      --text-soft:#6d675f;
      --text-faint:#9d968d;
      --accent:#b68b5d;
      --accent-soft:#d8c2a7;
      --blue:#dbe6ea;
      --peach:#ead9d0;
      --green:#dfe7d7;
      --shadow:0 18px 40px rgba(68,55,37,.08);
      --soft:0 8px 18px rgba(68,55,37,.06);
      --sans:Inter, "Segoe UI", Arial, sans-serif;
      --serif:"Iowan Old Style", Georgia, serif;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      padding:0;
      color:var(--text);
      font-family:var(--sans);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.75), transparent 40%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }

    .frame{
      min-height:100vh;
      padding:22px;
      background:transparent;
    }

    .board{
      min-height:calc(100vh - 44px);
      padding:26px 24px 20px;
      border-radius:28px;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.65), rgba(255,255,255,.9)),
        var(--surface);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.45),
        0 1px 0 rgba(255,255,255,.7),
        var(--shadow);
      border:1px solid rgba(214,205,194,.75);
      backdrop-filter:blur(4px);
    }

    .board::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(255,255,255,.45), transparent 28%);
      opacity:.7;
    }

    .top{
      display:grid;
      grid-template-columns:210px 1fr 200px;
      gap:22px;
      align-items:start;
      margin-bottom:22px;
      position:relative;
      z-index:1;
    }

    .pin-note,.qr-note{
      background:
        linear-gradient(180deg, rgba(255,255,255,.95), rgba(247,244,239,.98));
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--soft);
      font-family:var(--sans);
      position:relative;
      min-height:auto;
    }

    .pin-note:before,.qr-note:before{
      content:"";
      position:absolute;
      left:18px;
      right:18px;
      top:0;
      height:3px;
      border-radius:999px;
      background:linear-gradient(90deg, var(--accent), rgba(182,139,93,.2));
      opacity:.65;
    }

    .pin-note:after,
    .qr-note:after,
    .name:after,
    .card:after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      pointer-events:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
    }

    .name:after{
      border-radius:16px;
    }

    .pin-note{
      padding:14px;
      margin-top:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .pin-note button{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      background:
        linear-gradient(180deg, #b99367, #a98256);
      color:#fffdf9;
      font-family:var(--sans);
      font-size:0.98rem;
      font-weight:600;
      letter-spacing:.02em;
      cursor:pointer;
      box-shadow:
        0 10px 18px rgba(169,130,86,.18),
        inset 0 1px 0 rgba(255,255,255,.28);
      transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }

    .pin-note button:hover{
      filter:brightness(1.03);
      box-shadow:
        0 12px 20px rgba(169,130,86,.2),
        inset 0 1px 0 rgba(255,255,255,.28);
    }

    .pin-note button:active{
      transform:translateY(1px);
    }

    .status{
      display:none;
    }

    .center{
      text-align:center;
      padding-top:4px;
    }

    .qr-note{
      padding:14px 14px 12px;
      margin-top:10px;
    }

    #qrcode{
      width:154px;
      height:154px;
      margin:4px auto 4px;
      background:#fff;
      border-radius:18px;
      padding:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.04),
        0 8px 18px rgba(72,58,41,.05);
    }

    #qrcode img{
      width:136px;
      height:136px;
      display:block;
      border-radius:10px;
    }

    .rows{
      display:grid;
      gap:14px;
      position:relative;
      z-index:1;
      margin-top:6px;
    }

    .user-row{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:18px;
      align-items:center;
    }

    .name{
      justify-self:center;
      min-width:88px;
      padding:12px 14px;
      text-align:center;
      font-size:0.96rem;
      font-weight:600;
      color:var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(246,243,238,.98));
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--soft);
      position:relative;
      font-family:var(--sans);
      letter-spacing:.01em;
    }

    .lane{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:12px;
      padding:12px;
      min-height:90px;
      border:1px solid var(--line-soft);
      border-radius:22px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
    }

    .lane-blue{
      background:linear-gradient(180deg, #e4edf0, #dbe6ea);
    }

    .lane-peach{
      background:linear-gradient(180deg, #efdfd7, #ead9d0);
    }

    .lane-green{
      background:linear-gradient(180deg, #e6edde, #dfe7d7);
    }

    .card{
      min-height:72px;
      padding:12px 12px 10px;
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,246,243,.98));
      border:1px solid rgba(215,207,198,.9);
      border-radius:18px;
      box-shadow:0 8px 18px rgba(68,55,37,.05);
      display:grid;
      align-content:start;
      gap:6px;
    }

    .lane .card:nth-child(1){ transform:none; }
    .lane .card:nth-child(2){ transform:none; }
    .lane .card:nth-child(3){ transform:none; }

    .card:before{
      content:"";
      position:absolute;
      left:12px;
      right:12px;
      top:0;
      height:3px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(182,139,93,.45), rgba(182,139,93,0));
      opacity:.7;
    }

    .title2{
      font-size:clamp(0.92rem, 1.1vw, 1.05rem);
      line-height:1.18;
      font-weight:600;
      color:var(--text);
      letter-spacing:.01em;
    }

    .meta{
      font-family:var(--sans);
      font-size:.77rem;
      color:var(--text-soft);
      font-weight:500;
      letter-spacing:.01em;
    }

    .thumb{
      width:100%;
      aspect-ratio:4 / 1.7;
      object-fit:cover;
      border-radius:12px;
      border:1px solid rgba(219,210,200,.9);
      background:#f0ebe4;
      margin-top:4px;
      box-shadow:0 6px 14px rgba(68,55,37,.04);
    }

    .footer{
      margin-top:16px;
      text-align:center;
      font-family:var(--sans);
      font-size:.9rem;
      font-weight:600;
      color:var(--text-faint);
      position:relative;
      z-index:1;
      opacity:1;
      letter-spacing:.02em;
    }

    .featured-row {
      margin-bottom: 54px;
    }

    .featured-name {
      font-size: 1rem;
      padding: 13px 14px;
    }

    .featured-lane .card {
      min-height: 72px;
    }

    .featured-lane .title2 {
      font-size: clamp(0.94rem, 1.1vw, 1.08rem);
    }

    .featured-lane .meta {
      font-size: 0.76rem;
    }

    #night-screen{
      position:fixed;
      inset:0;
      background:#000;
      z-index:99999;
      display:none;
    }

    .logo-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:10px 12px;
    }

    .logo-wrap img{
      max-height:240px;
      width:auto;
      filter:
        drop-shadow(0 10px 16px rgba(68,55,37,.08))
        contrast(1.02);
    }

    @media (max-width:1180px){
      .top{
        grid-template-columns:1fr;
        justify-items:center;
      }
      .pin-note,.qr-note{
        width:min(100%,420px);
      }
      .user-row{
        grid-template-columns:1fr;
      }
      .name{
        justify-self:start;
        margin-left:12px;
      }
    }

    @media (max-width:860px){
      .lane{
        grid-template-columns:1fr;
      }
      .card{
        transform:none !important;
      }
    }
  </style>
</head>
<body>
  <div id="night-screen"></div>
  <div class="frame">
    <div class="board">
      <div class="top">
        <div class="pin-note">
          <button id="fullscreen-btn">Helskärm</button>
          <div class="status" id="poll-status"></div>
        </div>

        <div class="center">
          <div class="logo-wrap">
            <img src="skroja-logo.png" alt="Skröja Lerverkstad">
          </div>
        </div>

        <div class="qr-note">
          <div id="qrcode"></div>
        </div>
      </div>

      <div class="rows" id="rows"></div>
      <div class="footer">Powered by Lynoit Tech</div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'Lerverkstan', laneClass: 'lane-blue', featured: true },
      { name: 'Camilla', laneClass: 'lane-green' },
      { name: 'Christina', laneClass: 'lane-peach' },
      { name: 'Maria', laneClass: 'lane-green' }
    ];

    const hiddenActivities = [
       'Checka in'
    ];

    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };

    const activityAppUrl = 'https://lynoit.github.io/SkrojaAktivitet.html';
    const pollIntervalMs = 15000;
    const rowsContainer = document.getElementById('rows');
    const pollStatus = document.getElementById('poll-status');

    const nightScreen = document.getElementById('night-screen');
    let pollTimer = null;

    let lastSeenLatestFile = null;
    let hasLoadedOnce = false;

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" referrerpolicy="no-referrer">`;
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
      }

      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);

      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob'));

      return blobNodes
        .map(blob => {
          const name = blob.querySelector('Name')?.textContent || '';
          const lastModified = blob.querySelector('Properties > Last-Modified')?.textContent || '';
          return { name, lastModified };
        })
        .filter(blob => blob.name.endsWith('.json'));
    }

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }

    function isNightMode() {
      const hour = new Date().getHours();
      return hour >= 1 && hour < 6;
    }

    function updateNightMode() {
      const night = isNightMode();
      nightScreen.style.display = night ? 'block' : 'none';
    }

    async function safeLoadActivities() {
      if (isNightMode()) {
        updateNightMode();
        return;
      }

      updateNightMode();

      try {
        await loadActivities();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);

      pollTimer = setInterval(() => {
        safeLoadActivities();
      }, pollIntervalMs);
    }

    async function loadActivities(force = false) {
      if (pollStatus) pollStatus.textContent = '';

      const files = await listJsonBlobs();
      const sortedFiles = files
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name))
        .reverse();

      const latestFile = sortedFiles[0]?.name || null;

      if (!force && hasLoadedOnce && latestFile === lastSeenLatestFile) {
        return;
      }

      lastSeenLatestFile = latestFile;
      hasLoadedOnce = true;

      const recentFiles = sortedFiles.slice(0, 20).map(file => file.name);
      const records = await Promise.all(recentFiles.map(readJsonRecord));

      const cutoff = Date.now() - (14 * 24 * 60 * 60 * 1000);
      const byUser = Object.fromEntries(users.map(user => [user.name, []]));

      records
        .filter(record => record && record.member && record.timestamp)
        .filter(record => {
          const ts = new Date(record.timestamp).getTime();
          return Number.isFinite(ts) && ts >= cutoff;
        })
        .filter(record => !hiddenActivities.includes(record.activity))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
        .forEach(record => {
          if (!byUser[record.member]) return;
          if (record.member === 'Lerverkstan' || byUser[record.member].length < 4) {
            byUser[record.member].push(record);
          }
        });

      renderRows(byUser);
      if (pollStatus) pollStatus.textContent = '';
    }

    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';

      users.forEach(user => {
        const activities = byUser[user.name] || [];
        if (!activities.length) return;

        const row = document.createElement('section');
        row.className = user.featured ? 'user-row featured-row' : 'user-row';

        const nameTag = document.createElement('div');
        nameTag.className = user.featured ? 'name featured-name' : 'name';
        nameTag.textContent = user.name;

        const lane = document.createElement('div');
        lane.className = user.featured
          ? `lane ${user.laneClass} featured-lane`
          : `lane ${user.laneClass}`;

        const visibleActivities = user.name === 'Lerverkstan'
          ? activities
          : activities.slice(0, 4);

        visibleActivities.forEach(activity => {
          const card = document.createElement('article');
          card.className = 'card';
          const imageHtml = activity.hasImage && activity.imageFileName
            ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
            : '';
          card.innerHTML = `
            <div class="title2">${activity.activity || 'Okänd aktivitet'}</div>
            <div class="meta">${formatTime(activity.timestamp)}</div>
            ${imageHtml}
          `;
          lane.appendChild(card);
        });

        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }

    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    });

    buildQrCode();
    updateNightMode();

    if (!isNightMode()) {
      safeLoadActivities();
    } else {
      renderRows({});
    }

    startPolling();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anslagstavla demo</title>
  <style>
    :root{
      --wall:#dfd6c9;
      --frame-a:#be8b55;
      --frame-b:#9c673b;
      --frame-c:#845328;
      --cork-a:#d2a06b;
      --cork-b:#bf8752;
      --cork-c:#b57b47;
      --paper:#ecd9b3;
      --paper-2:#d7bd8d;
      --ink:#5a4738;
      --blue:#98b8c6;
      --peach:#dda286;
      --green:#b5c171;
      --shadow:0 18px 36px rgba(70,48,22,.22);
      --soft:0 8px 16px rgba(70,48,22,.12);
      --sans:"Trebuchet MS", Arial, sans-serif;
      --serif:Georgia, "Times New Roman", serif;
    }

    *{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  padding:0;
  color:var(--ink);
  font-family:var(--serif);
  background:#000;
}

.frame{
  min-height:100vh;
  padding:16px;
  border-radius:0;
  display:flex;
  flex-direction:column;
  background:
    linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.12)),
    url("wood.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  box-shadow:none;
}

.board{
  min-height:calc(100vh - 32px);
  padding:20px 18px 14px;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.08)),
    url("cork.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.07),
    inset 0 18px 40px rgba(255,255,255,.05),
    inset 0 -18px 28px rgba(91,56,27,.07);
}

    .top{
      display:grid;
      grid-template-columns:210px 1fr 200px;
      gap:18px;
      align-items:start;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }

.pin-note,.qr-note{
  background:
    linear-gradient(180deg, rgba(255,255,255,.45) 0%, rgba(255,255,255,.16) 18%, rgba(0,0,0,.03) 100%),
    linear-gradient(135deg, #f3e3c7 0%, #ead6b1 55%, #dcc397 100%);
  border:2px solid rgba(40,28,18,.55);
  border-radius:6px;
  box-shadow:
    0 2px 3px rgba(0,0,0,.10),
    0 8px 14px rgba(0,0,0,.16),
    0 18px 26px rgba(0,0,0,.18),
    0 1px 0 rgba(255,255,255,.55) inset,
    0 -10px 18px rgba(90,60,30,.06) inset,
    -8px 0 14px rgba(255,255,255,.05) inset,
    8px 0 14px rgba(0,0,0,.04) inset;
  font-family:var(--sans);
  position:relative;
  min-height:auto;
}

    .pin-note:before,.qr-note:before{
      content:"";
      position:absolute;
      top:-14px;
      left:50%;
      transform:translateX(-50%);
      width:18px;
      height:18px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.95) 0 2px, rgba(255,255,255,.55) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #f4ead9 0 5px, #d8c2a7 5px 7px, #8c6b4f 7px 9px);
      box-shadow:
        0 2px 3px rgba(0,0,0,.28),
        inset 0 -1px 2px rgba(0,0,0,.18);
      z-index:3;
    }

    .pin-note:after,
.qr-note:after,
.name:after,
.card:after{
  content:"";
  position:absolute;
  left:50%;
  top:0px;
  transform:translateX(-50%);
  width:2px;
  height:18px;
  border-radius:2px;
  background:linear-gradient(180deg, #d8d8d8 0%, #b7b7b7 35%, #7f7f7f 100%);
  box-shadow:
    0 1px 2px rgba(0,0,0,.20),
    1px 0 0 rgba(255,255,255,.20);
  z-index:2;
}    

  .name:after{
  top:-6px;
  height:16px;
}
    
.pin-note{
  width:75%;
  margin:8px auto 0;
  padding:12px;
  transform:rotate(-1.2deg);
  display:flex;
  align-items:center;
  justify-content:center;
}

    .pin-note button{
      width:100%;
      border:none;
      border-radius:10px;
      padding:12px 14px;
      background:linear-gradient(180deg,#9ebdcc,#8aabbb);
      color:#fff8ef;
      font-family:var(--sans);
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--soft);
    }

    .status{
      display:none;
    }

    .center{
      text-align:center;
      padding-top:2px;
    }

    .title{
      display:inline-block;
      padding:16px 36px 13px;
      border-radius:24px;
      color:#fff9f0;
      font-size:clamp(2.4rem, 3.6vw, 3.25rem);
      line-height:1;
      box-shadow:var(--shadow);
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,0) 14%, rgba(0,0,0,.08) 100%),
        linear-gradient(180deg,#9d693c,#7f5227);
    }

    .qr-note{
      padding:10px 10px 8px;
      transform:rotate(1.5deg);
      margin-top:10px;
    }

    .qr-note:before{
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.85) 0 2px, rgba(255,255,255,.35) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #e59877 0 5px, #c97252 5px 7px, #845440 7px 9px);
    }

.qr-title{
  text-align:center;
  font-family:var(--sans);
  font-size:.95rem;
  font-weight:800;
  letter-spacing:.03em;
  margin:2px 0 8px;
  color:var(--ink);
}
    
    #qrcode{
      width:154px;
      height:154px;
      margin:4px auto 8px;
      background:#fff;
      border-radius:8px;
      padding:7px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);
    }

    #qrcode img{
      width:140px;
      height:140px;
      display:block;
    }

    .rows{
      display:grid;
      gap:12px;
      position:relative;
      z-index:1;
      margin-top:2px;
    }

.user-row{
  display:grid;
  grid-template-columns:110px max-content;
  gap:18px;
  align-items:center;
}

.name{
  justify-self:center;
  min-width:78px;
  padding:7px 10px;
  text-align:center;
  font-size:1rem;
  font-weight:700;
  background:
    linear-gradient(180deg, rgba(255,255,255,.45) 0%, rgba(255,255,255,.16) 18%, rgba(0,0,0,.03) 100%),
    linear-gradient(135deg, #f3e3c7 0%, #ead6b1 55%, #dcc397 100%);
  border:2px solid rgba(40,28,18,.55);
  border-radius:6px;
  box-shadow:
    0 2px 3px rgba(0,0,0,.10),
    0 8px 14px rgba(0,0,0,.16),
    0 18px 26px rgba(0,0,0,.18),
    0 1px 0 rgba(255,255,255,.55) inset,
    0 -10px 18px rgba(90,60,30,.06) inset,
    -8px 0 14px rgba(255,255,255,.05) inset,
    8px 0 14px rgba(0,0,0,.04) inset;
  transform:rotate(-1.4deg);
  position:relative;
  font-family:var(--sans);
}

.name:before{
  content:"";
  position:absolute;
  top:-20px;
  left:50%;
  transform:translateX(-50%);
  width:16px;
  height:16px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 32%, rgba(255,255,255,.95) 0 2px, rgba(255,255,255,.5) 2px 4px, transparent 4px),
    radial-gradient(circle at 50% 52%, #efe6d6 0 4px, #d1bca2 4px 6px, #86664b 6px 8px);
  box-shadow:0 2px 3px rgba(0,0,0,.22), inset 0 -1px 2px rgba(0,0,0,.15);
  z-index:3;
}

.lane{
  display:flex;
  gap:10px;
  padding:8px 8px;
  min-height:78px;
  width:fit-content;
  justify-self:start;
  align-items:flex-start;
  border-top:2px solid rgba(122,82,45,.34);
  border-bottom:2px solid rgba(122,82,45,.34);
  border-left:1px solid rgba(255,255,255,.18);
  border-right:1px solid rgba(255,255,255,.18);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
}

.featured-lane{
  flex-wrap:wrap;
  width:auto;
  max-width:100%;
  align-content:flex-start;
}
    
.lane-blue{
  background:linear-gradient(180deg, #9bbbc9, #89aebe);
}

.lane-peach{
  background:linear-gradient(180deg, #e2a68a, #d79778);
}

.lane-green{
  background:linear-gradient(180deg, #b9c57a, #aebb66);
}

.card{
  min-height:68px;
  padding:8px 8px 6px;
  position:relative;
  background:
    linear-gradient(180deg, rgba(255,255,255,.45) 0%, rgba(255,255,255,.18) 18%, rgba(0,0,0,.03) 100%),
    linear-gradient(135deg, #f3e3c7 0%, #ead6b1 55%, #dcc397 100%);
  border:none;
  border-radius:4px;
  box-shadow:
    0 2px 3px rgba(0,0,0,.10),
    0 8px 14px rgba(0,0,0,.16),
    0 18px 26px rgba(0,0,0,.18),
    0 1px 0 rgba(255,255,255,.55) inset,
    0 -10px 18px rgba(90,60,30,.06) inset,
    -8px 0 14px rgba(255,255,255,.05) inset,
    8px 0 14px rgba(0,0,0,.04) inset;
  display:grid;
  align-content:start;
  gap:6px;
  transform-origin:center top;
  width:240px;
}

    .lane .card:nth-child(1){ transform:rotate(-1.5deg); }
    .lane .card:nth-child(2){ transform:rotate(.95deg); }
    .lane .card:nth-child(3){ transform:rotate(-.75deg); }

    .card:before{
      content:"";
      position:absolute;
      top:-14px;
      left:50%;
      transform:translateX(-50%);
      width:17px;
      height:17px;
      border-radius:50%;
      box-shadow:0 2px 3px rgba(0,0,0,.24), inset 0 -1px 2px rgba(0,0,0,.16);
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.95) 0 2px, rgba(255,255,255,.45) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #efe6d6 0 4px, #d1bca2 4px 6px, #86664b 6px 8px);
      z-index:3;
    }

    .lane-peach .card:before{
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.9) 0 2px, rgba(255,255,255,.35) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #e79a78 0 4px, #cb7354 4px 6px, #855341 6px 8px);
    }
    .lane-green .card:before{
      background:
        radial-gradient(circle at 35% 32%, rgba(255,255,255,.9) 0 2px, rgba(255,255,255,.35) 2px 4px, transparent 4px),
        radial-gradient(circle at 50% 52%, #93b8bb 0 4px, #6f9ea1 4px 6px, #4f6d70 6px 8px);
    }

    .title2{
      font-size:clamp(0.9rem, 1.1vw, 1.08rem);
      line-height:1.03;
      font-weight:700;
    }

    .meta{
      font-family:var(--sans);
      font-size:.74rem;
    }

.thumb{
  width:100%;
  aspect-ratio:4 / 1.7;
  object-fit:contain;
  object-position:center;
  border-radius:2px;
  border:2px solid rgba(226,212,193,.95);
  background:transparent;
  margin-top:2px;
  display:block;
}
    
.footer{
  margin-top:auto;
  padding-top:12px;
  text-align:center;
  font-family:var(--sans);
  font-size:.95rem;
  font-weight:800;
  color:#111;
  text-shadow:
    0 1px 0 rgba(255,255,255,.18),
    0 -1px 0 rgba(0,0,0,.18),
    0 2px 4px rgba(0,0,0,.12);
  position:relative;
  z-index:1;
  opacity:1;
}

.featured-row {
  margin-bottom: 54px;
  grid-template-columns:110px minmax(0, 1fr);
  align-items:start;
}

.featured-name {
  font-size: 1rem;
  padding: 7px 10px;
}    

.featured-lane .card {
  min-height: 68px;
}

.featured-lane .title2 {
  font-size: clamp(0.9rem, 1.1vw, 1.08rem);
}

.featured-lane .meta {
  font-size: 0.74rem;
}

#night-screen{
  position:fixed;
  inset:0;
  background:#000;
  z-index:99999;
  display:none;
}

.logo-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  transform:translateY(-10px);
}

.logo-wrap img{
  max-height:280px;
  width:auto;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,.28));
}    

    @media (max-width:1180px){
      .top{
        grid-template-columns:1fr;
        justify-items:center;
      }
      .pin-note,.qr-note{
        width:min(100%,420px);
      }
      .user-row{
        grid-template-columns:1fr;
      }
      .name{
        justify-self:start;
        margin-left:12px;
      }
    }

    @media (max-width:860px){
      .lane{
        grid-template-columns:1fr;
      }
      .card{
        transform:none !important;
      }
    }
  </style>
</head>
<body>
  <div id="night-screen"></div>
  <div class="frame">
    <div class="board">
      <div class="top">
        <div class="pin-note">
          <button id="fullscreen-btn">Helskärm</button>
          <div class="status" id="poll-status"></div>
        </div>

<div class="center">
  <div class="logo-wrap">
    <img src="Digital_anslagstavla.png" alt="Lynoit Tech">
  </div>
</div>

<div class="qr-note">
  <div class="qr-title">Lägg till aktivitet</div>
  <div id="qrcode"></div>
</div>
      </div>

      <div class="rows" id="rows"></div>
      <div class="footer">Powered by Lynoit Tech</div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'Kom ihåg', laneClass: 'lane-blue', featured: true },
      { name: 'Hem', laneClass: 'lane-green' },
      { name: 'Jobb', laneClass: 'lane-peach' },
      { name: 'Fritid', laneClass: 'lane-green' }
    ];

const noPhotoActivities = ['Checka in', 'Checka ut'];

const hiddenActivities = ['Checka in', 'Checka ut'];    

    const azureConfig = {
      accountName: 'anslagstavlademo',
      containerName: 'activities',
      sasToken: 'sv=2025-11-05&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2027-12-31T21:35:37Z&st=2026-04-12T12:20:37Z&spr=https&sig=Psn0eO%2BOBq1CClXjpxVmNo2Nttuksp%2BkPcLxwEIvR4w%3D'
    };

    const activityAppUrl = 'https://lynoit.github.io/Demo_aktivitet.html';
    const pollIntervalMs = 15000;
    const rowsContainer = document.getElementById('rows');
    const pollStatus = document.getElementById('poll-status');

    const nightScreen = document.getElementById('night-screen');
    let pollTimer = null;

    let lastSeenLatestFile = null;
    let hasLoadedOnce = false;

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" referrerpolicy="no-referrer">`;
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

async function listJsonBlobs() {
  const { accountName, containerName, sasToken } = azureConfig;
  if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
    throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
  }

  const query = sasToken.replace(/^\?/, '');
  const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
  const response = await fetch(url);
  if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);

  const xml = await response.text();
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  const blobNodes = Array.from(doc.querySelectorAll('Blob'));

  return blobNodes
    .map(blob => {
      const name = blob.querySelector('Name')?.textContent || '';
      const lastModified = blob.querySelector('Properties > Last-Modified')?.textContent || '';
      return { name, lastModified };
    })
    .filter(blob => blob.name.endsWith('.json'));
}

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }

function isNightMode() {
  const hour = new Date().getHours();
  return hour >= 1 && hour < 6;
}

function updateNightMode() {
  const night = isNightMode();
  nightScreen.style.display = night ? 'block' : 'none';
}

async function safeLoadActivities() {
  if (isNightMode()) {
    updateNightMode();
    return;
  }

  updateNightMode();

  try {
    await loadActivities();
  } catch (error) {
    console.error(error);
    if (pollStatus) pollStatus.textContent = '';
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);

  pollTimer = setInterval(() => {
    safeLoadActivities();
  }, pollIntervalMs);
}    

async function loadActivities(force = false) {
  if (pollStatus) pollStatus.textContent = '';

  const files = await listJsonBlobs();
  const sortedFiles = files
    .slice()
    .sort((a, b) => a.name.localeCompare(b.name))
    .reverse();

  const latestFile = sortedFiles[0]?.name || null;

  // Första laddningen ska alltid ske
  // Därefter bara om senaste filen ändrats, eller om force=true
  if (!force && hasLoadedOnce && latestFile === lastSeenLatestFile) {
    return;
  }

  lastSeenLatestFile = latestFile;
  hasLoadedOnce = true;

  const recentFiles = sortedFiles.slice(0, 20).map(file => file.name);
  const records = await Promise.all(recentFiles.map(readJsonRecord));

  const cutoff = Date.now() - (14 * 24 * 60 * 60 * 1000);
  const byUser = Object.fromEntries(users.map(user => [user.name, []]));

  records
    .filter(record => record && record.member && record.timestamp)
    .filter(record => {
      const ts = new Date(record.timestamp).getTime();
      return Number.isFinite(ts) && ts >= cutoff;
    })
    .filter(record => !hiddenActivities.includes(record.activity))
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
    .forEach(record => {
      if (!byUser[record.member]) return;
      if (record.member === 'Lerverkstan' || byUser[record.member].length < 4) {
           byUser[record.member].push(record);
      }
    });

  renderRows(byUser);
  if (pollStatus) pollStatus.textContent = '';
}

    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';

      users.forEach(user => {
        const activities = byUser[user.name] || [];
        if (!activities.length) return;

const row = document.createElement('section');
row.className = user.featured ? 'user-row featured-row' : 'user-row';

const nameTag = document.createElement('div');
nameTag.className = user.featured ? 'name featured-name' : 'name';
        nameTag.textContent = user.name;

const lane = document.createElement('div');
lane.className = user.featured
  ? `lane ${user.laneClass} featured-lane`
  : `lane ${user.laneClass}`;

const visibleActivities = user.name === 'Lerverkstan'
  ? activities
  : activities.slice(0, 4);

visibleActivities.forEach(activity => {
  const card = document.createElement('article');
  card.className = 'card';
  const imageHtml = activity.hasImage && activity.imageFileName
    ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
    : '';
  card.innerHTML = `
    <div class="title2">${activity.activity || 'Okänd aktivitet'}</div>
    <div class="meta">${formatTime(activity.timestamp)}</div>
    ${imageHtml}
  `;
  lane.appendChild(card);
});

        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }

    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    });

buildQrCode();
updateNightMode();

if (!isNightMode()) {
  safeLoadActivities();
} else {
  renderRows({});
}

startPolling();
  </script>
</body>
</html>

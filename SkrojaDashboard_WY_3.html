<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skröja Anslagstavla</title>
  <style>
    :root{
      --bg:#000000;
      --bg-soft:#031103;
      --panel:#000000;
      --panel-2:#021402;
      --line:#0d3f0d;
      --line-soft:#0a2b0a;
      --green:#19ff19;
      --green-soft:#11bb11;
      --green-dim:#0d8d0d;
      --green-faint:#0a5f0a;
      --shadow-green:0 0 8px rgba(25,255,25,.28), 0 0 18px rgba(25,255,25,.12);
      --soft:0 0 0 1px rgba(25,255,25,.08), inset 0 0 18px rgba(25,255,25,.03);
      --mono:"Courier New", Consolas, monospace;
    }

    *{box-sizing:border-box}

    html, body{
      background:#000;
    }

    body{
      margin:0;
      min-height:100vh;
      padding:0;
      color:var(--green);
      font-family:var(--mono);
      background:
        radial-gradient(circle at 50% 30%, rgba(20,255,20,.045), transparent 38%),
        linear-gradient(180deg, #000000, #010401 48%, #000000 100%);
      text-shadow:var(--shadow-green);
      letter-spacing:.01em;
    }

    .frame{
      min-height:100vh;
      padding:12px;
      background:#000;
    }

    .board{
      min-height:calc(100vh - 24px);
      padding:18px 18px 14px;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(0,0,0,.92), rgba(0,20,0,.14)),
        #000;
      box-shadow:inset 0 0 0 1px rgba(25,255,25,.06);
    }

    .board::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(25,255,25,.065) 0px,
          rgba(25,255,25,.065) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity:.22;
      mix-blend-mode:screen;
    }

    .board::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, transparent 58%, rgba(0,0,0,.18) 100%);
      opacity:.9;
    }

    .top{
      display:grid;
      grid-template-columns:210px 1fr 200px;
      gap:18px;
      align-items:start;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }

    .pin-note,.qr-note{
      background:
        linear-gradient(180deg, rgba(0,0,0,.72), rgba(0,20,0,.18)),
        #000;
      border:1px solid rgba(25,255,25,.18);
      position:relative;
      box-shadow:var(--soft);
      overflow:hidden;
    }

    .pin-note::before,
    .qr-note::before,
    .name::before,
    .card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:1px;
      background:rgba(25,255,25,.42);
      box-shadow:0 0 8px rgba(25,255,25,.18);
    }

    .pin-note{
      padding:12px;
      margin-top:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .pin-note button{
      width:100%;
      border:1px solid rgba(25,255,25,.35);
      padding:12px 14px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,24,0,.18)),
        #000;
      color:var(--green);
      font-family:var(--mono);
      font-size:1rem;
      font-weight:700;
      text-transform:uppercase;
      cursor:pointer;
      text-shadow:var(--shadow-green);
      box-shadow:
        inset 0 0 0 1px rgba(25,255,25,.06),
        0 0 12px rgba(25,255,25,.06);
    }

    .pin-note button:hover{
      background:
        linear-gradient(180deg, rgba(0,0,0,.45), rgba(0,30,0,.22)),
        #000;
      box-shadow:
        inset 0 0 0 1px rgba(25,255,25,.08),
        0 0 14px rgba(25,255,25,.1);
    }

    .pin-note button:active{
      transform:translateY(1px);
    }

    .status{
      display:none;
    }

    .center{
      text-align:center;
      padding-top:0;
      position:relative;
    }

    .logo-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:220px;
      position:relative;
      padding:8px 12px;
    }

    .logo-wrap::before{
      content:"WEYLAND-YUTANI CORP";
      position:absolute;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      color:var(--green-soft);
      font-size:clamp(1.2rem, 2vw, 2rem);
      font-weight:700;
      letter-spacing:.03em;
      text-shadow:0 0 10px rgba(25,255,25,.18);
      white-space:nowrap;
      opacity:.82;
    }

    .logo-wrap::after{
      content:"BUILDING BETTER WORLDS";
      position:absolute;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      color:var(--green-dim);
      font-size:clamp(.7rem, 1.1vw, 1.2rem);
      font-weight:700;
      letter-spacing:.02em;
      text-shadow:0 0 8px rgba(25,255,25,.12);
      white-space:nowrap;
      opacity:.82;
    }

    .logo-wrap img{
      max-height:190px;
      width:auto;
      opacity:.7;
      filter:
        grayscale(1)
        sepia(1)
        hue-rotate(50deg)
        saturate(18)
        brightness(.6)
        contrast(1.2)
        drop-shadow(0 0 10px rgba(25,255,25,.12));
      mix-blend-mode:screen;
    }

    .qr-note{
      padding:10px 10px 8px;
      margin-top:10px;
    }

    #qrcode{
      width:154px;
      height:154px;
      margin:4px auto 8px;
      background:#001700;
      border:1px solid rgba(25,255,25,.22);
      padding:7px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 14px rgba(25,255,25,.08);
    }

    #qrcode img{
      width:140px;
      height:140px;
      display:block;
      filter:
        grayscale(1)
        contrast(1.3)
        brightness(1.1)
        sepia(1)
        hue-rotate(50deg)
        saturate(14);
      mix-blend-mode:screen;
    }

    .rows{
      display:grid;
      gap:12px;
      position:relative;
      z-index:1;
      margin-top:2px;
    }

    .user-row{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:18px;
      align-items:center;
    }

    .name{
      justify-self:center;
      min-width:78px;
      padding:10px 10px;
      text-align:left;
      font-size:1rem;
      font-weight:700;
      color:var(--green);
      background:
        linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,18,0,.18)),
        #000;
      border:1px solid rgba(25,255,25,.2);
      box-shadow:var(--soft);
      position:relative;
      font-family:var(--mono);
      text-transform:uppercase;
      text-shadow:var(--shadow-green);
    }

    .lane{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      padding:8px;
      min-height:78px;
      border:1px solid rgba(25,255,25,.12);
      box-shadow:inset 0 0 0 1px rgba(25,255,25,.03);
      position:relative;
      overflow:hidden;
    }

    .lane::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 90px,
          rgba(25,255,25,.03) 90px,
          rgba(25,255,25,.03) 91px
        );
      opacity:.45;
    }

    .lane-blue,
    .lane-peach,
    .lane-green{
      background:
        linear-gradient(180deg, rgba(0,0,0,.5), rgba(0,22,0,.15)),
        #000;
    }

    .card{
      min-height:68px;
      padding:10px 10px 8px;
      position:relative;
      background:
        linear-gradient(180deg, rgba(0,0,0,.45), rgba(0,16,0,.18)),
        #000;
      border:1px solid rgba(25,255,25,.16);
      box-shadow:
        inset 0 0 0 1px rgba(25,255,25,.025),
        0 0 10px rgba(25,255,25,.03);
      display:grid;
      align-content:start;
      gap:6px;
    }

    .lane .card:nth-child(1),
    .lane .card:nth-child(2),
    .lane .card:nth-child(3){
      transform:none;
    }

    .title2{
      font-size:clamp(0.92rem, 1.1vw, 1.05rem);
      line-height:1.08;
      font-weight:700;
      color:var(--green);
      text-transform:uppercase;
      text-shadow:var(--shadow-green);
      word-break:break-word;
    }

    .meta{
      font-family:var(--mono);
      font-size:.74rem;
      color:var(--green-soft);
      text-shadow:0 0 8px rgba(25,255,25,.12);
    }

    .thumb{
      width:100%;
      aspect-ratio:4 / 1.7;
      object-fit:cover;
      border:1px solid rgba(25,255,25,.18);
      background:#001500;
      margin-top:2px;
      filter:
        grayscale(1)
        contrast(1.1)
        brightness(.8)
        sepia(1)
        hue-rotate(50deg)
        saturate(12);
      mix-blend-mode:screen;
    }

    .footer{
      margin-top:12px;
      text-align:center;
      font-family:var(--mono);
      font-size:.92rem;
      font-weight:700;
      color:var(--green-dim);
      text-shadow:0 0 8px rgba(25,255,25,.12);
      position:relative;
      z-index:1;
      opacity:1;
      text-transform:uppercase;
      letter-spacing:.02em;
    }

    .featured-row{
      margin-bottom:54px;
    }

    .featured-name{
      font-size:1rem;
      padding:10px 10px;
    }

    .featured-lane .card{
      min-height:68px;
    }

    .featured-lane .title2{
      font-size:clamp(0.94rem, 1.1vw, 1.08rem);
    }

    .featured-lane .meta{
      font-size:0.74rem;
    }

    #night-screen{
      position:fixed;
      inset:0;
      background:#000;
      z-index:99999;
      display:none;
    }

    @media (max-width:1180px){
      .top{
        grid-template-columns:1fr;
        justify-items:center;
      }
      .pin-note,.qr-note{
        width:min(100%,420px);
      }
      .user-row{
        grid-template-columns:1fr;
      }
      .name{
        justify-self:start;
        margin-left:12px;
      }
      .logo-wrap::before,
      .logo-wrap::after{
        position:static;
        transform:none;
        display:block;
        margin:4px 0;
      }
      .logo-wrap{
        min-height:auto;
        flex-direction:column;
        gap:10px;
      }
    }

    @media (max-width:860px){
      .lane{
        grid-template-columns:1fr;
      }
      .card{
        transform:none !important;
      }
    }
  </style>
</head>
<body>
  <div id="night-screen"></div>
  <div class="frame">
    <div class="board">
      <div class="top">
        <div class="pin-note">
          <button id="fullscreen-btn">Helskärm</button>
          <div class="status" id="poll-status"></div>
        </div>

        <div class="center">
          <div class="logo-wrap">
            <img src="skroja-logo.png" alt="Skröja Lerverkstad">
          </div>
        </div>

        <div class="qr-note">
          <div id="qrcode"></div>
        </div>
      </div>

      <div class="rows" id="rows"></div>
      <div class="footer">Powered by Lynoit Tech</div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'Lerverkstan', laneClass: 'lane-blue', featured: true },
      { name: 'Camilla', laneClass: 'lane-green' },
      { name: 'Christina', laneClass: 'lane-peach' },
      { name: 'Maria', laneClass: 'lane-green' }
    ];

    const hiddenActivities = [
       'Checka in'
    ];

    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };

    const activityAppUrl = 'https://lynoit.github.io/SkrojaAktivitet.html';
    const pollIntervalMs = 15000;
    const rowsContainer = document.getElementById('rows');
    const pollStatus = document.getElementById('poll-status');

    const nightScreen = document.getElementById('night-screen');
    let pollTimer = null;

    let lastSeenLatestFile = null;
    let hasLoadedOnce = false;

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" referrerpolicy="no-referrer">`;
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
      }

      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);

      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob'));

      return blobNodes
        .map(blob => {
          const name = blob.querySelector('Name')?.textContent || '';
          const lastModified = blob.querySelector('Properties > Last-Modified')?.textContent || '';
          return { name, lastModified };
        })
        .filter(blob => blob.name.endsWith('.json'));
    }

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }

    function isNightMode() {
      const hour = new Date().getHours();
      return hour >= 1 && hour < 6;
    }

    function updateNightMode() {
      const night = isNightMode();
      nightScreen.style.display = night ? 'block' : 'none';
    }

    async function safeLoadActivities() {
      if (isNightMode()) {
        updateNightMode();
        return;
      }

      updateNightMode();

      try {
        await loadActivities();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);

      pollTimer = setInterval(() => {
        safeLoadActivities();
      }, pollIntervalMs);
    }

    async function loadActivities(force = false) {
      if (pollStatus) pollStatus.textContent = '';

      const files = await listJsonBlobs();
      const sortedFiles = files
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name))
        .reverse();

      const latestFile = sortedFiles[0]?.name || null;

      if (!force && hasLoadedOnce && latestFile === lastSeenLatestFile) {
        return;
      }

      lastSeenLatestFile = latestFile;
      hasLoadedOnce = true;

      const recentFiles = sortedFiles.slice(0, 20).map(file => file.name);
      const records = await Promise.all(recentFiles.map(readJsonRecord));

      const cutoff = Date.now() - (14 * 24 * 60 * 60 * 1000);
      const byUser = Object.fromEntries(users.map(user => [user.name, []]));

      records
        .filter(record => record && record.member && record.timestamp)
        .filter(record => {
          const ts = new Date(record.timestamp).getTime();
          return Number.isFinite(ts) && ts >= cutoff;
        })
        .filter(record => !hiddenActivities.includes(record.activity))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
        .forEach(record => {
          if (!byUser[record.member]) return;
          if (record.member === 'Lerverkstan' || byUser[record.member].length < 4) {
            byUser[record.member].push(record);
          }
        });

      renderRows(byUser);
      if (pollStatus) pollStatus.textContent = '';
    }

    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';

      users.forEach(user => {
        const activities = byUser[user.name] || [];
        if (!activities.length) return;

        const row = document.createElement('section');
        row.className = user.featured ? 'user-row featured-row' : 'user-row';

        const nameTag = document.createElement('div');
        nameTag.className = user.featured ? 'name featured-name' : 'name';
        nameTag.textContent = user.name;

        const lane = document.createElement('div');
        lane.className = user.featured
          ? `lane ${user.laneClass} featured-lane`
          : `lane ${user.laneClass}`;

        const visibleActivities = user.name === 'Lerverkstan'
          ? activities
          : activities.slice(0, 4);

        visibleActivities.forEach(activity => {
          const card = document.createElement('article');
          card.className = 'card';
          const imageHtml = activity.hasImage && activity.imageFileName
            ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
            : '';
          card.innerHTML = `
            <div class="title2">${activity.activity || 'Okänd aktivitet'}</div>
            <div class="meta">${formatTime(activity.timestamp)}</div>
            ${imageHtml}
          `;
          lane.appendChild(card);
        });

        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }

    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    });

    buildQrCode();
    updateNightMode();

    if (!isNightMode()) {
      safeLoadActivities();
    } else {
      renderRows({});
    }

    startPolling();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skröja Anslagstavla</title>
  <style>
    :root{
      --bg:#060708;
      --bg2:#0b0d0f;
      --screen:#101417;
      --panel:#151a1d;
      --panel2:#1b2126;
      --panel3:#232a30;
      --line:#31393f;
      --line2:#465058;
      --text:#d9dddf;
      --text-dim:#8d969d;
      --accent:#d6a11c;
      --accent2:#f0b52a;
      --warn:#d5851f;
      --green:#87a08b;
      --shadow:0 22px 48px rgba(0,0,0,.45);
      --soft:0 10px 22px rgba(0,0,0,.28);
      --sans:"Arial Narrow","Roboto Condensed",Arial,sans-serif;
      --mono:"Courier New",Consolas,monospace;
    }

    *{box-sizing:border-box}

    html{
      background:#000;
    }

    body{
      margin:0;
      min-height:100vh;
      padding:0;
      color:var(--text);
      font-family:var(--sans);
      letter-spacing:.03em;
      background:
        radial-gradient(circle at 50% -10%, rgba(214,161,28,.08), transparent 28%),
        linear-gradient(180deg, #020303, #08090a 35%, #040506 100%);
    }

    .frame{
      min-height:100vh;
      padding:14px;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.012) 0,
          rgba(255,255,255,.012) 1px,
          transparent 1px,
          transparent 96px
        ),
        linear-gradient(180deg, rgba(255,255,255,.015), rgba(0,0,0,.18)),
        linear-gradient(180deg, #0a0c0e, #111417);
    }

    .board{
      min-height:calc(100vh - 28px);
      padding:18px 18px 14px;
      border-radius:4px;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.12)),
        linear-gradient(135deg, rgba(214,161,28,.04), transparent 18%),
        linear-gradient(180deg, var(--screen), var(--bg2));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.03),
        inset 0 0 0 2px rgba(214,161,28,.05),
        inset 0 30px 50px rgba(255,255,255,.015),
        inset 0 -24px 38px rgba(0,0,0,.26),
        var(--shadow);
    }

    .board::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.018) 0px,
          rgba(255,255,255,.018) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity:.16;
      mix-blend-mode:screen;
    }

    .board::after{
      content:"WEYLAND-YUTANI // BUILDING BETTER WORLDS // DISPLAY NODE";
      position:absolute;
      top:8px;
      right:14px;
      font-family:var(--mono);
      font-size:.66rem;
      color:rgba(214,161,28,.52);
      letter-spacing:.18em;
      z-index:2;
      pointer-events:none;
    }

    .top{
      display:grid;
      grid-template-columns:210px 1fr 200px;
      gap:18px;
      align-items:start;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }

    .pin-note,.qr-note{
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.12)),
        linear-gradient(180deg, var(--panel2), var(--panel));
      border:1px solid var(--line2);
      border-radius:2px;
      box-shadow:var(--soft);
      overflow:hidden;
    }

    .pin-note::before,
    .qr-note::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:3px;
      background:
        linear-gradient(90deg, var(--accent2), var(--accent), transparent 78%);
      z-index:2;
    }

    .pin-note::after,
    .qr-note::after,
    .name::after,
    .card::after{
      content:"";
      position:absolute;
      top:8px;
      left:8px;
      width:11px;
      height:11px;
      border:1px solid rgba(214,161,28,.6);
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.25)),
        #0e1012;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 0 1px rgba(0,0,0,.35);
      z-index:3;
    }

    .pin-note{
      padding:12px;
      margin-top:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .pin-note button{
      width:100%;
      border:1px solid #6f5416;
      border-radius:2px;
      padding:12px 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.14)),
        linear-gradient(180deg, #372909, #1d1708);
      color:var(--accent2);
      font-family:var(--sans);
      font-size:1rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.16em;
      cursor:pointer;
      box-shadow:
        inset 0 0 0 1px rgba(214,161,28,.08),
        0 6px 16px rgba(0,0,0,.24);
      transition:filter .15s ease, transform .15s ease;
    }

    .pin-note button:hover{
      filter:brightness(1.08);
    }

    .pin-note button:active{
      transform:translateY(1px);
    }

    .status{
      display:none;
    }

    .center{
      text-align:center;
      padding-top:2px;
      position:relative;
    }

    .center::before,
    .center::after{
      content:"";
      position:absolute;
      top:50%;
      width:17%;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(214,161,28,.35), transparent);
    }

    .center::before{ left:0; }
    .center::after{ right:0; }

    .logo-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      transform:translateY(-10px);
      position:relative;
      padding:18px 28px 16px;
      border:1px solid rgba(214,161,28,.18);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.1)),
        linear-gradient(180deg, #14191d, #101316);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        0 10px 20px rgba(0,0,0,.22);
    }

    .logo-wrap::before{
      content:"CORPORATE UPLINK";
      position:absolute;
      top:-11px;
      left:10px;
      padding:0 6px;
      background:#0f1316;
      font-family:var(--mono);
      font-size:.58rem;
      color:rgba(214,161,28,.65);
      letter-spacing:.16em;
    }

    .logo-wrap::after{
      content:"STATUS // ACTIVE";
      position:absolute;
      bottom:-11px;
      right:10px;
      padding:0 6px;
      background:#0f1316;
      font-family:var(--mono);
      font-size:.58rem;
      color:rgba(214,161,28,.65);
      letter-spacing:.16em;
    }

    .logo-wrap img{
      max-height:280px;
      width:auto;
      filter:
        grayscale(.18)
        contrast(1.12)
        brightness(.9)
        drop-shadow(0 8px 16px rgba(0,0,0,.32));
    }

    .qr-note{
      padding:10px 10px 8px;
      margin-top:10px;
    }

    .qr-note .label{
      margin:0 0 8px;
      padding-left:20px;
      font-family:var(--mono);
      font-size:.68rem;
      color:rgba(214,161,28,.72);
      text-transform:uppercase;
      letter-spacing:.16em;
    }

    #qrcode{
      width:154px;
      height:154px;
      margin:4px auto 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.08)),
        #d7d8d4;
      border-radius:1px;
      padding:7px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.3),
        0 8px 16px rgba(0,0,0,.22);
    }

    #qrcode img{
      width:140px;
      height:140px;
      display:block;
      filter:contrast(1.08);
    }

    .rows{
      display:grid;
      gap:12px;
      position:relative;
      z-index:1;
      margin-top:2px;
    }

    .user-row{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:18px;
      align-items:center;
    }

    .name{
      justify-self:center;
      min-width:78px;
      padding:11px 10px 9px 24px;
      text-align:left;
      font-size:.9rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.12)),
        linear-gradient(180deg, #1b2126, #15191c);
      border:1px solid var(--line2);
      border-radius:2px;
      box-shadow:var(--soft);
      position:relative;
      font-family:var(--sans);
    }

    .name::before{
      content:"UNIT";
      position:absolute;
      top:-10px;
      right:8px;
      font-family:var(--mono);
      font-size:.58rem;
      color:rgba(214,161,28,.62);
      letter-spacing:.16em;
      z-index:3;
      background:#12161a;
      padding:0 4px;
    }

    .lane{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      padding:10px;
      min-height:86px;
      border-top:1px solid var(--line2);
      border-bottom:1px solid var(--line2);
      border-left:1px solid rgba(255,255,255,.04);
      border-right:1px solid rgba(255,255,255,.04);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.025),
        inset 0 0 0 1px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .lane::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 72px,
          rgba(255,255,255,.012) 72px,
          rgba(255,255,255,.012) 73px
        );
      opacity:.5;
    }

    .lane::after{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:2px;
      background:linear-gradient(90deg, var(--accent), transparent 80%);
      opacity:.65;
    }

    .lane-blue{
      background:
        linear-gradient(180deg, rgba(135,160,139,.06), rgba(0,0,0,.04)),
        linear-gradient(180deg, #171c20, #13171a);
    }

    .lane-peach{
      background:
        linear-gradient(180deg, rgba(213,133,31,.08), rgba(0,0,0,.04)),
        linear-gradient(180deg, #191d20, #14181b);
    }

    .lane-green{
      background:
        linear-gradient(180deg, rgba(135,160,139,.08), rgba(0,0,0,.04)),
        linear-gradient(180deg, #171c20, #13171a);
    }

    .card{
      min-height:68px;
      padding:12px 10px 8px 24px;
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.14)),
        linear-gradient(180deg, var(--panel3), var(--panel2));
      border:1px solid var(--line2);
      border-radius:2px;
      box-shadow:var(--soft);
      display:grid;
      align-content:start;
      gap:6px;
      overflow:hidden;
    }

    .lane .card:nth-child(1),
    .lane .card:nth-child(2),
    .lane .card:nth-child(3){
      transform:none;
    }

    .card::before{
      content:"REC";
      position:absolute;
      top:8px;
      right:8px;
      font-family:var(--mono);
      font-size:.58rem;
      color:rgba(214,161,28,.68);
      letter-spacing:.16em;
      z-index:3;
    }

    .lane-peach .card::before{
      color:rgba(213,133,31,.78);
    }

    .lane-green .card::before{
      color:rgba(135,160,139,.8);
    }

    .title2{
      font-size:clamp(0.9rem, 1.1vw, 1.05rem);
      line-height:1.08;
      font-weight:700;
      color:var(--text);
      font-family:var(--sans);
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .meta{
      font-family:var(--mono);
      font-size:.72rem;
      color:var(--text-dim);
      letter-spacing:.08em;
    }

    .thumb{
      width:100%;
      aspect-ratio:4 / 1.7;
      object-fit:cover;
      border-radius:1px;
      border:1px solid var(--line);
      background:#0f1113;
      margin-top:2px;
      filter:saturate(.7) contrast(1.04) brightness(.84);
    }

    .footer{
      margin-top:12px;
      text-align:center;
      font-family:var(--mono);
      font-size:.8rem;
      font-weight:700;
      color:rgba(214,161,28,.82);
      text-transform:uppercase;
      letter-spacing:.2em;
      position:relative;
      z-index:1;
      padding-top:10px;
      border-top:1px solid rgba(214,161,28,.18);
    }

    .featured-row{
      margin-bottom:54px;
    }

    .featured-name{
      font-size:1rem;
      padding:11px 10px 9px 24px;
    }

    .featured-lane .card{
      min-height:68px;
    }

    .featured-lane .title2{
      font-size:clamp(0.9rem, 1.1vw, 1.08rem);
    }

    .featured-lane .meta{
      font-size:0.74rem;
    }

    #night-screen{
      position:fixed;
      inset:0;
      background:#000;
      z-index:99999;
      display:none;
    }

    @media (max-width:1180px){
      .top{
        grid-template-columns:1fr;
        justify-items:center;
      }
      .pin-note,.qr-note{
        width:min(100%,420px);
      }
      .user-row{
        grid-template-columns:1fr;
      }
      .name{
        justify-self:start;
        margin-left:12px;
      }
    }

    @media (max-width:860px){
      .lane{
        grid-template-columns:1fr;
      }
      .card{
        transform:none !important;
      }
    }
  </style>
</head>
<body>
  <div id="night-screen"></div>
  <div class="frame">
    <div class="board">
      <div class="top">
        <div class="pin-note">
          <button id="fullscreen-btn">Helskärm</button>
          <div class="status" id="poll-status"></div>
        </div>

        <div class="center">
          <div class="logo-wrap">
            <img src="skroja-logo.png" alt="Skröja Lerverkstad">
          </div>
        </div>

        <div class="qr-note">
          <div class="label">Access Link</div>
          <div id="qrcode"></div>
        </div>
      </div>

      <div class="rows" id="rows"></div>
      <div class="footer">Powered by Lynoit Tech</div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'Lerverkstan', laneClass: 'lane-blue', featured: true },
      { name: 'Camilla', laneClass: 'lane-green' },
      { name: 'Christina', laneClass: 'lane-peach' },
      { name: 'Maria', laneClass: 'lane-green' }
    ];

    const hiddenActivities = [
       'Checka in'
    ];

    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };

    const activityAppUrl = 'https://lynoit.github.io/SkrojaAktivitet.html';
    const pollIntervalMs = 15000;
    const rowsContainer = document.getElementById('rows');
    const pollStatus = document.getElementById('poll-status');

    const nightScreen = document.getElementById('night-screen');
    let pollTimer = null;

    let lastSeenLatestFile = null;
    let hasLoadedOnce = false;

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" referrerpolicy="no-referrer">`;
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
      }

      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);

      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob'));

      return blobNodes
        .map(blob => {
          const name = blob.querySelector('Name')?.textContent || '';
          const lastModified = blob.querySelector('Properties > Last-Modified')?.textContent || '';
          return { name, lastModified };
        })
        .filter(blob => blob.name.endsWith('.json'));
    }

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }

    function isNightMode() {
      const hour = new Date().getHours();
      return hour >= 1 && hour < 6;
    }

    function updateNightMode() {
      const night = isNightMode();
      nightScreen.style.display = night ? 'block' : 'none';
    }

    async function safeLoadActivities() {
      if (isNightMode()) {
        updateNightMode();
        return;
      }

      updateNightMode();

      try {
        await loadActivities();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);

      pollTimer = setInterval(() => {
        safeLoadActivities();
      }, pollIntervalMs);
    }

    async function loadActivities(force = false) {
      if (pollStatus) pollStatus.textContent = '';

      const files = await listJsonBlobs();
      const sortedFiles = files
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name))
        .reverse();

      const latestFile = sortedFiles[0]?.name || null;

      if (!force && hasLoadedOnce && latestFile === lastSeenLatestFile) {
        return;
      }

      lastSeenLatestFile = latestFile;
      hasLoadedOnce = true;

      const recentFiles = sortedFiles.slice(0, 20).map(file => file.name);
      const records = await Promise.all(recentFiles.map(readJsonRecord));

      const cutoff = Date.now() - (14 * 24 * 60 * 60 * 1000);
      const byUser = Object.fromEntries(users.map(user => [user.name, []]));

      records
        .filter(record => record && record.member && record.timestamp)
        .filter(record => {
          const ts = new Date(record.timestamp).getTime();
          return Number.isFinite(ts) && ts >= cutoff;
        })
        .filter(record => !hiddenActivities.includes(record.activity))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
        .forEach(record => {
          if (!byUser[record.member]) return;
          if (record.member === 'Lerverkstan' || byUser[record.member].length < 4) {
            byUser[record.member].push(record);
          }
        });

      renderRows(byUser);
      if (pollStatus) pollStatus.textContent = '';
    }

    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';

      users.forEach(user => {
        const activities = byUser[user.name] || [];
        if (!activities.length) return;

        const row = document.createElement('section');
        row.className = user.featured ? 'user-row featured-row' : 'user-row';

        const nameTag = document.createElement('div');
        nameTag.className = user.featured ? 'name featured-name' : 'name';
        nameTag.textContent = user.name;

        const lane = document.createElement('div');
        lane.className = user.featured
          ? `lane ${user.laneClass} featured-lane`
          : `lane ${user.laneClass}`;

        const visibleActivities = user.name === 'Lerverkstan'
          ? activities
          : activities.slice(0, 4);

        visibleActivities.forEach(activity => {
          const card = document.createElement('article');
          card.className = 'card';
          const imageHtml = activity.hasImage && activity.imageFileName
            ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
            : '';
          card.innerHTML = `
            <div class="title2">${activity.activity || 'Okänd aktivitet'}</div>
            <div class="meta">${formatTime(activity.timestamp)}</div>
            ${imageHtml}
          `;
          lane.appendChild(card);
        });

        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }

    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    });

    buildQrCode();
    updateNightMode();

    if (!isNightMode()) {
      safeLoadActivities();
    } else {
      renderRows({});
    }

    startPolling();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Demo Anslagstavla</title>
  <style>
    :root{
      --wall:#e5dccf;
      --paper:#f5ecdc;
      --paper-2:#efe3cf;
      --ink:#5d4738;
      --muted:#8b7660;
      --wood-a:#c28c56;
      --wood-b:#a86e3f;
      --wood-c:#8f5b31;
      --blue:#82acc3;
      --green:#b3bf67;
      --yellow:#e7cf83;
      --coral:#db8a60;
      --shadow:0 18px 40px rgba(85,60,35,.22);
      --soft:0 8px 18px rgba(85,60,35,.10);
      --sans:"Trebuchet MS", Arial, sans-serif;
      --serif:Georgia, "Times New Roman", serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      color:var(--ink);
      font-family:var(--serif);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.55), transparent 28%),
        linear-gradient(180deg,#ddd3c4 0%, var(--wall) 100%);
    }
    .phone{
      width:min(100%,342px);
      min-height:min(92vh,780px);
      border-radius:46px;
      padding:16px;
      position:relative;
      box-shadow:0 28px 48px rgba(70,48,22,.28);
      background:
        repeating-linear-gradient(90deg,
          rgba(255,255,255,.10) 0 7px,
          rgba(0,0,0,.02) 7px 14px,
          rgba(255,255,255,.04) 14px 22px),
        linear-gradient(180deg,var(--wood-a) 0%, var(--wood-b) 62%, var(--wood-c) 100%);
    }
    .phone:before,.phone:after{
      content:"";
      position:absolute;
      right:-3px;
      width:7px;
      border-radius:7px;
      background:rgba(255,255,255,.45);
      box-shadow:inset 0 1px 2px rgba(0,0,0,.18);
    }
    .phone:before{top:126px;height:50px}
    .phone:after{top:192px;height:70px}
    .screen{
      min-height:calc(min(92vh,780px) - 32px);
      position:relative;
      overflow:hidden;
      border-radius:30px;
      border:2px solid rgba(111,79,49,.18);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.58), transparent 14%),
        radial-gradient(circle at 80% 14%, rgba(255,255,255,.32), transparent 14%),
        linear-gradient(180deg,rgba(255,255,255,.62), rgba(255,255,255,.14)),
        linear-gradient(180deg,var(--paper) 0%, var(--paper-2) 100%);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.4), inset 0 -18px 32px rgba(164,132,92,.09);
      padding:24px 18px 22px;
    }
    .screen:before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.22;
      pointer-events:none;
      background-image:
        radial-gradient(rgba(118,88,57,.12) .8px, transparent .9px),
        radial-gradient(rgba(255,255,255,.3) .8px, transparent .9px);
      background-size:16px 16px, 16px 16px;
      background-position:0 0, 8px 8px;
    }
    .content{position:relative;z-index:1}
    .note{
      text-align:center;
      font-family:var(--sans);
      font-size:.88rem;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:#876d56;
      margin:2px 0 10px;
    }
    .step{display:none}
    .step.active{display:block}
    h1{
      margin:18px 0 8px;
      text-align:center;
      font-size:clamp(2.1rem, 5vw, 2.55rem);
      line-height:1.05;
      font-weight:700;
    }
    .rule{
      width:82%;
      height:2px;
      margin:0 auto 24px;
      background:linear-gradient(90deg, transparent, rgba(93,71,56,.48), transparent);
    }
    .stack{
      width:min(100%,210px);
      margin:0 auto;
      display:grid;
      gap:12px;
    }
    button,input[type=text]{
      font-family:var(--sans);
    }
    .btn,.btn-soft,.btn-accent{
      min-height:58px;
      border:none;
      border-radius:9px;
      padding:12px 16px;
      font-size:1.08rem;
      font-weight:700;
      box-shadow:var(--soft);
      cursor:pointer;
      transition:transform .12s ease;
    }
    .btn:active,.btn-soft:active,.btn-accent:active{transform:translateY(1px) scale(.99)}
    .btn{color:#fff8ef;text-shadow:0 1px 0 rgba(0,0,0,.12)}
    .blue{background:linear-gradient(180deg,#93bad0, var(--blue))}
    .green{background:linear-gradient(180deg,#c0cb78, var(--green))}
    .yellow{background:linear-gradient(180deg,#eedc99, var(--yellow)); color:#5e4a35; text-shadow:none}
    .coral{background:linear-gradient(180deg,#e69a73, var(--coral))}
    .btn-soft{
      background:linear-gradient(180deg,#aac6d3,#8fb0c0);
      color:#fff8ef;
    }
    .btn-accent{
      background:linear-gradient(180deg,#e89a6e,#dc875f);
      color:#fff8ef;
    }
    .textblock{
      width:min(100%,220px);
      margin:0 auto 10px;
    }
    label{
      display:block;
      margin:0 0 6px;
      font-family:var(--sans);
      font-size:.98rem;
      color:#7b6652;
    }
    input[type=text]{
      width:100%;
      border-radius:10px;
      border:2px solid #dac9b1;
      background:rgba(255,255,255,.64);
      padding:11px 14px;
      font-size:1rem;
      color:var(--ink);
      box-shadow:inset 0 1px 3px rgba(116,86,51,.08);
    }
    .prompt-card,.summary{
      width:min(100%,246px);
      margin:0 auto;
      background:rgba(249,243,232,.82);
      border:2px solid rgba(154,124,91,.14);
      box-shadow:0 10px 18px rgba(85,60,35,.08);
      border-radius:10px;
      padding:12px;
      position:relative;
    }
    .summary:before{
      content:"";
      position:absolute;
      top:-8px;
      left:50%;
      transform:translateX(-50%);
      width:16px;
      height:16px;
      border-radius:50%;
      background:#d17f5c;
      box-shadow:0 1px 2px rgba(0,0,0,.22);
    }
    .prompt-card p,.result-card p{
      margin:0;
      text-align:center;
      font-family:var(--sans);
      line-height:1.42;
      font-size:.98rem;
    }
    .pair{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:14px;
    }
    .summary-title{
      padding-top:4px;
      margin-bottom:10px;
      text-align:center;
      font-family:var(--sans);
      font-size:1.03rem;
      font-weight:700;
    }
    .row{
      display:grid;
      grid-template-columns:82px 1fr;
      gap:10px;
      padding:8px 2px;
      border-top:1px solid rgba(93,71,56,.18);
      font-family:var(--sans);
      font-size:.96rem;
      align-items:start;
    }
    .row strong{color:#5b4637}
    .preview{
      margin-top:10px;
      min-height:136px;
      border-radius:9px;
      border:2px solid #dfcfb7;
      background:#ecdfc8;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      color:#806a55;
      font-family:var(--sans);
      font-size:.94rem;
      text-align:center;
      padding:8px;
    }
    .preview img{
      width:100%;
      display:block;
      object-fit:cover;
      max-height:220px;
    }
    .decision{
      width:min(100%,246px);
      margin:12px auto 0;
      display:grid;
      gap:10px;
    }
    .decision .ask{
      text-align:center;
      font-family:var(--sans);
      font-size:1rem;
    }
    .result-card{
      width:min(100%,246px);
      margin:0 auto;
      padding:18px 14px;
      border-radius:10px;
      background:rgba(249,243,232,.84);
      border:2px solid rgba(154,124,91,.14);
      box-shadow:0 10px 18px rgba(85,60,35,.08);
      text-align:center;
    }
    .result-card p + p{margin-top:10px;color:#7c6652;font-size:.95rem}
    #camera-input{display:none}
    @media (max-width:430px){
      body{padding:0}
      .phone{
        width:100%;
        min-height:100vh;
        border-radius:0;
        padding:0;
      }
      .phone:before,.phone:after{display:none}
      .screen{
        min-height:100vh;
        border-radius:0;
        padding-top:calc(22px + env(safe-area-inset-top));
        padding-bottom:calc(22px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="content">
        <div class="note">Demo anslagstavla</div>

        <section id="step-user" class="step active">
          <h1>Kategori</h1>
          <div class="rule"></div>
          <div class="stack" id="user-buttons"></div>
        </section>

        <section id="step-activity" class="step">
          <h1>Skriv in aktivitet</h1>
          <div class="rule"></div>
          <div class="stack" id="activity-buttons"></div>
          <div class="textblock">
            <label for="custom-activity">Annan aktivitet</label>
            <input id="custom-activity" type="text" maxlength="80" placeholder="Skriv aktivitet här" />
          </div>
          <div class="stack">
            <button class="btn-accent" id="activity-continue">Fortsätt</button>
            <button class="btn-soft" id="activity-back">Tillbaka</button>
          </div>
        </section>

        <section id="step-photo" class="step">
          <h1>Vill du ta en bild?</h1>
          <div class="rule"></div>
          <div class="prompt-card">
            <p>Om du väljer <strong>Ja</strong> öppnas kameran direkt på mobilen.</p>
            <div class="pair">
              <button class="btn green" id="photo-yes">Ja</button>
              <button class="btn coral" id="photo-no">Nej</button>
            </div>
          </div>
          <input id="camera-input" type="file" accept="image/*" capture="environment" />
          <div class="stack" style="margin-top:12px">
            <button class="btn-soft" id="photo-back">Tillbaka</button>
          </div>
        </section>

        <section id="step-summary" class="step">
          <h1>Sammanställning</h1>
          <div class="rule"></div>
          <div class="summary">
            <div class="summary-title">Arbetskort</div>
            <div class="row"><strong>Namn</strong><span id="summary-user"></span></div>
            <div class="row"><strong>Aktivitet</strong><span id="summary-activity"></span></div>
            <div class="row"><strong>Tid</strong><span id="summary-time"></span></div>
            <div class="row"><strong>Bild</strong><span id="summary-image-text"></span></div>
            <div class="preview" id="preview-wrap"><span>Ingen bild vald</span></div>
          </div>
          <div class="decision">
            <div class="ask">Skicka till anslagstavla?</div>
            <button class="btn yellow" id="send-yes">Ja, skicka</button>
            <button class="btn-soft" id="send-no">Nej, börja om</button>
          </div>
        </section>

        <section id="step-result" class="step">
          <h1 id="result-title">Klart</h1>
          <div class="rule"></div>
          <div class="result-card">
            <p id="result-message"></p>
            <p id="result-submessage"></p>
          </div>
          <div class="stack" style="margin-top:12px">
            <button class="btn green" id="start-over">Ny registrering</button>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
  const members = [
    { name: 'Kom ihåg', color: 'blue' },
    { name: 'Hem', color: 'green' },
    { name: 'Jobb', color: 'yellow' },
    { name: 'Fritid', color: 'coral' },
    { name: 'Surdegar', color: 'red' }
  ];

  const activityOptions = [
    { name: 'Checka in', color: 'coral' },
    { name: 'Checka ut', color: 'blue' }
  ];

  // Aktiviteter som INTE ska fråga efter bild
const noPhotoActivities = ['Checka in', 'Checka ut'];

  const azureConfig = {
    accountName: 'anslagstavlademo',
    containerName: 'activities',
    sasToken: 'sv=2025-11-05&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2027-12-31T21:35:37Z&st=2026-04-12T12:20:37Z&spr=https&sig=Psn0eO%2BOBq1CClXjpxVmNo2Nttuksp%2BkPcLxwEIvR4w%3D'
  };

  const state = { member:'', activity:'', photoFile:null, photoDataUrl:'', timestampIso:'' };

  const steps = {
    user: document.getElementById('step-user'),
    activity: document.getElementById('step-activity'),
    photo: document.getElementById('step-photo'),
    summary: document.getElementById('step-summary'),
    result: document.getElementById('step-result')
  };

  const userButtons = document.getElementById('user-buttons');
  const activityButtons = document.getElementById('activity-buttons');
  const customActivityInput = document.getElementById('custom-activity');
  const cameraInput = document.getElementById('camera-input');
  const previewWrap = document.getElementById('preview-wrap');

  function showStep(name){
    Object.values(steps).forEach(step => step.classList.remove('active'));
    steps[name].classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function shouldSkipPhoto(activityName) {
    return noPhotoActivities.includes(activityName);
  }

  function goToNextStepAfterActivity() {
    // Rensa eventuell tidigare bild om aktiviteten inte ska ha bild
    if (shouldSkipPhoto(state.activity)) {
      state.photoFile = null;
      state.photoDataUrl = '';
      updateSummary();
      showStep('summary');
    } else {
      showStep('photo');
    }
  }

  function renderButtons(){
    userButtons.innerHTML = '';
    activityButtons.innerHTML = '';

    members.forEach(member => {
      const button = document.createElement('button');
      button.className = `btn ${member.color}`;
      button.textContent = member.name;
      button.addEventListener('click', () => {
        state.member = member.name;
        showStep('activity');
      });
      userButtons.appendChild(button);
    });

    activityOptions.forEach(activity => {
      const button = document.createElement('button');
      button.className = `btn ${activity.color}`;
      button.textContent = activity.name;
      button.addEventListener('click', () => {
        state.activity = activity.name;
        customActivityInput.value = '';
        goToNextStepAfterActivity();
      });
      activityButtons.appendChild(button);
    });
  }

  function setResult(title, message, submessage=''){
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-message').textContent = message;
    document.getElementById('result-submessage').textContent = submessage;
    showStep('result');
  }

  function resetState(){
    state.member = '';
    state.activity = '';
    state.photoFile = null;
    state.photoDataUrl = '';
    state.timestampIso = '';
    customActivityInput.value = '';
    cameraInput.value = '';
    previewWrap.innerHTML = '<span>Ingen bild vald</span>';
    showStep('user');
  }

  function timestampBase(){
    const d = new Date();
    const pad = value => String(value).padStart(2, '0');
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
  }

  function formatSwedish(isoString){
    return new Date(isoString).toLocaleString('sv-SE', {
      year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit'
    });
  }

  function updateSummary(){
    state.timestampIso = new Date().toISOString();
    const hasImage = Boolean(state.photoFile);
    document.getElementById('summary-user').textContent = state.member;
    document.getElementById('summary-activity').textContent = state.activity;
    document.getElementById('summary-time').textContent = formatSwedish(state.timestampIso);
    document.getElementById('summary-image-text').textContent = hasImage ? 'Bild vald' : 'Ingen bild';
    previewWrap.innerHTML = (hasImage && state.photoDataUrl)
      ? `<img src="${state.photoDataUrl}" alt="Förhandsvisning" />`
      : '<span>Ingen bild vald</span>';
  }

  async function uploadToAzure(){
    const { accountName, containerName, sasToken } = azureConfig;
    if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
      throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i filen först.');
    }

    const query = sasToken.replace(/^\?/, '');
    const baseUrl = `https://${accountName}.blob.core.windows.net/${containerName}`;
    const baseName = timestampBase();
    const jsonName = `${baseName}.json`;
    const jpgName = `${baseName}.jpg`;

    const payload = {
      timestamp: state.timestampIso,
      member: state.member,
      activity: state.activity,
      hasImage: Boolean(state.photoFile),
      imageFileName: state.photoFile ? jpgName : null,
      jsonFileName: jsonName,
      source: 'SkrojaAktivitet'
    };

    const jsonResponse = await fetch(`${baseUrl}/${encodeURIComponent(jsonName)}?${query}`, {
      method: 'PUT',
      headers: {
        'x-ms-blob-type': 'BlockBlob',
        'x-ms-version': '2023-11-03',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload, null, 2)
    });

    if (!jsonResponse.ok) {
      const text = await jsonResponse.text().catch(() => '');
      throw new Error(`Kunde inte ladda upp JSON (${jsonResponse.status}). ${text}`);
    }

    if (state.photoFile) {
      const imageResponse = await fetch(`${baseUrl}/${encodeURIComponent(jpgName)}?${query}`, {
        method: 'PUT',
        headers: {
          'x-ms-blob-type': 'BlockBlob',
          'x-ms-version': '2023-11-03',
          'Content-Type': state.photoFile.type || 'image/jpeg'
        },
        body: state.photoFile
      });

      if (!imageResponse.ok) {
        const text = await imageResponse.text().catch(() => '');
        throw new Error(`Kunde inte ladda upp bild (${imageResponse.status}). ${text}`);
      }
    }

    return { jsonName, jpgName: state.photoFile ? jpgName : null };
  }

  document.getElementById('activity-continue').addEventListener('click', () => {
    const manualText = customActivityInput.value.trim();
    if (manualText) state.activity = manualText;

    if (!state.activity) {
      alert('Välj eller skriv en aktivitet först.');
      return;
    }

    goToNextStepAfterActivity();
  });

  document.getElementById('activity-back').addEventListener('click', () => showStep('user'));
  document.getElementById('photo-back').addEventListener('click', () => showStep('activity'));
  document.getElementById('photo-yes').addEventListener('click', () => cameraInput.click());

  document.getElementById('photo-no').addEventListener('click', () => {
    state.photoFile = null;
    state.photoDataUrl = '';
    updateSummary();
    showStep('summary');
  });

  cameraInput.addEventListener('change', event => {
    const [file] = event.target.files || [];
    if (!file) {
      updateSummary();
      showStep('summary');
      return;
    }

    state.photoFile = file;
    const reader = new FileReader();
    reader.onload = () => {
      state.photoDataUrl = reader.result;
      updateSummary();
      showStep('summary');
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('send-no').addEventListener('click', resetState);

  document.getElementById('send-yes').addEventListener('click', async () => {
    try {
      setResult('Skickar...', 'Uppladdning pågår.', 'Lämna sidan öppen tills uppladdningen är klar.');
      const result = await uploadToAzure();
      setResult(
        'Klart',
        `Registreringen skickades till anslagstavlan.${result.jpgName ? ' Bilden följde med.' : ''}`,
        `JSON: ${result.jsonName}${result.jpgName ? ` | Bild: ${result.jpgName}` : ''}`
      );
    } catch (error) {
      console.error(error);
      setResult('Det gick inte', error.message || 'Något gick fel vid uppladdning.');
    }
  });

  document.getElementById('start-over').addEventListener('click', resetState);
  renderButtons();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skröja Anslagstavla</title>
  <style>
    :root{
      --bg:#f3f0eb;
      --bg-2:#ece7e1;
      --surface:#fbf9f6;
      --surface-2:#f6f2ed;
      --surface-3:#efe9e1;
      --line:#d8d0c7;
      --line-soft:#e7e0d8;
      --text:#2d2925;
      --text-soft:#6f685f;
      --text-faint:#9e968c;
      --accent:#8f7a64;
      --accent-soft:#c8b9a8;
      --blue:#e6ecee;
      --peach:#eee3d9;
      --green:#e5eadf;
      --shadow:0 24px 50px rgba(58,46,34,.08);
      --soft:0 10px 24px rgba(58,46,34,.05);
      --sans:Inter, "Helvetica Neue", Arial, sans-serif;
      --serif:"Iowan Old Style", "Cormorant Garamond", Georgia, serif;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      padding:0;
      color:var(--text);
      font-family:var(--sans);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.78), transparent 34%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .frame{
      min-height:100vh;
      padding:26px;
    }

    .board{
      min-height:calc(100vh - 52px);
      padding:30px 28px 22px;
      border-radius:30px;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.72), rgba(251,249,246,.98)),
        var(--surface);
      border:1px solid rgba(216,208,199,.92);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.75),
        0 1px 0 rgba(255,255,255,.65),
        var(--shadow);
    }

    .board::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(255,255,255,.4), transparent 24%);
      opacity:.7;
    }

    .board::after{
      content:"S K R Ö J A  /  C U R A T E D   B O A R D";
      position:absolute;
      top:18px;
      right:24px;
      font-size:.7rem;
      letter-spacing:.22em;
      color:var(--text-faint);
      font-weight:500;
      z-index:1;
    }

    .top{
      display:grid;
      grid-template-columns:210px 1fr 200px;
      gap:24px;
      align-items:start;
      margin-bottom:26px;
      position:relative;
      z-index:1;
    }

    .pin-note,.qr-note{
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(246,242,237,.98));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--soft);
      position:relative;
    }

    .pin-note::before,.qr-note::before{
      content:"";
      position:absolute;
      left:22px;
      right:22px;
      top:0;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(143,122,100,.55), rgba(143,122,100,.08));
    }

    .pin-note:after,
    .qr-note:after,
    .name:after,
    .card:after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      pointer-events:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
    }

    .pin-note{
      padding:15px;
      margin-top:10px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .pin-note button{
      width:100%;
      border:none;
      border-radius:16px;
      padding:15px 16px;
      background:
        linear-gradient(180deg, #9a856f, #876f58);
      color:#fffdfa;
      font-family:var(--sans);
      font-size:.98rem;
      font-weight:600;
      letter-spacing:.01em;
      cursor:pointer;
      box-shadow:
        0 12px 22px rgba(135,111,88,.18),
        inset 0 1px 0 rgba(255,255,255,.24);
      transition:transform .15s ease, filter .15s ease, box-shadow .15s ease;
    }

    .pin-note button:hover{
      filter:brightness(1.03);
      box-shadow:
        0 14px 24px rgba(135,111,88,.2),
        inset 0 1px 0 rgba(255,255,255,.24);
    }

    .pin-note button:active{
      transform:translateY(1px);
    }

    .status{
      display:none;
    }

    .center{
      text-align:center;
      padding-top:6px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .logo-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:160px;
      padding:10px 18px;
    }

    .logo-wrap img{
      max-height:220px;
      width:auto;
      filter:
        drop-shadow(0 10px 18px rgba(58,46,34,.06))
        contrast(1.02);
    }

    .qr-note{
      padding:15px 15px 13px;
      margin-top:10px;
    }

    #qrcode{
      width:154px;
      height:154px;
      margin:4px auto 4px;
      background:#fff;
      border-radius:20px;
      padding:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.035),
        0 8px 18px rgba(58,46,34,.05);
    }

    #qrcode img{
      width:134px;
      height:134px;
      display:block;
      border-radius:12px;
    }

    .rows{
      display:grid;
      gap:16px;
      position:relative;
      z-index:1;
      margin-top:6px;
    }

    .user-row{
      display:grid;
      grid-template-columns:126px 1fr;
      gap:20px;
      align-items:center;
    }

    .name{
      justify-self:center;
      min-width:92px;
      padding:14px 14px;
      text-align:center;
      font-size:.95rem;
      font-weight:600;
      color:var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(245,241,236,.98));
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--soft);
      position:relative;
      letter-spacing:.01em;
    }

    .lane{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:14px;
      padding:14px;
      min-height:94px;
      border:1px solid var(--line-soft);
      border-radius:24px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.55);
    }

    .lane-blue{
      background:linear-gradient(180deg, #ebf0f1, #e3eaec);
    }

    .lane-peach{
      background:linear-gradient(180deg, #f1e7df, #ebdfd5);
    }

    .lane-green{
      background:linear-gradient(180deg, #e9eee4, #e2e8dc);
    }

    .card{
      min-height:74px;
      padding:14px 14px 12px;
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,243,238,.99));
      border:1px solid rgba(216,208,199,.88);
      border-radius:20px;
      box-shadow:0 10px 22px rgba(58,46,34,.045);
      display:grid;
      align-content:start;
      gap:7px;
    }

    .lane .card:nth-child(1),
    .lane .card:nth-child(2),
    .lane .card:nth-child(3){
      transform:none;
    }

    .card:before{
      content:"";
      position:absolute;
      left:14px;
      right:14px;
      top:0;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(143,122,100,.32), rgba(143,122,100,0));
    }

    .title2{
      font-size:clamp(.94rem, 1.1vw, 1.06rem);
      line-height:1.2;
      font-weight:600;
      color:var(--text);
      letter-spacing:.005em;
    }

    .meta{
      font-size:.77rem;
      color:var(--text-soft);
      font-weight:500;
      letter-spacing:.01em;
    }

    .thumb{
      width:100%;
      aspect-ratio:4 / 1.7;
      object-fit:cover;
      border-radius:14px;
      border:1px solid rgba(220,212,202,.92);
      background:#f0ebe4;
      margin-top:4px;
      box-shadow:0 8px 16px rgba(58,46,34,.035);
    }

    .footer{
      margin-top:18px;
      text-align:center;
      font-size:.88rem;
      font-weight:500;
      color:var(--text-faint);
      position:relative;
      z-index:1;
      letter-spacing:.04em;
    }

    .featured-row{
      margin-bottom:54px;
    }

    .featured-name{
      font-size:.98rem;
      padding:15px 14px;
    }

    .featured-lane .card{
      min-height:74px;
    }

    .featured-lane .title2{
      font-size:clamp(.96rem, 1.1vw, 1.08rem);
    }

    .featured-lane .meta{
      font-size:.76rem;
    }

    #night-screen{
      position:fixed;
      inset:0;
      background:#000;
      z-index:99999;
      display:none;
    }

    @media (max-width:1180px){
      .top{
        grid-template-columns:1fr;
        justify-items:center;
      }
      .pin-note,.qr-note{
        width:min(100%,420px);
      }
      .user-row{
        grid-template-columns:1fr;
      }
      .name{
        justify-self:start;
        margin-left:12px;
      }
    }

    @media (max-width:860px){
      .lane{
        grid-template-columns:1fr;
      }
      .card{
        transform:none !important;
      }
    }
  </style>
</head>
<body>
  <div id="night-screen"></div>
  <div class="frame">
    <div class="board">
      <div class="top">
        <div class="pin-note">
          <button id="fullscreen-btn">Helskärm</button>
          <div class="status" id="poll-status"></div>
        </div>

        <div class="center">
          <div class="logo-wrap">
            <img src="skroja-logo.png" alt="Skröja Lerverkstad">
          </div>
        </div>

        <div class="qr-note">
          <div id="qrcode"></div>
        </div>
      </div>

      <div class="rows" id="rows"></div>
      <div class="footer">Powered by Lynoit Tech</div>
    </div>
  </div>

  <script>
    const users = [
      { name: 'Lerverkstan', laneClass: 'lane-blue', featured: true },
      { name: 'Camilla', laneClass: 'lane-green' },
      { name: 'Christina', laneClass: 'lane-peach' },
      { name: 'Maria', laneClass: 'lane-green' }
    ];

    const hiddenActivities = [
       'Checka in'
    ];

    const azureConfig = {
      accountName: 'skroja',
      containerName: 'activities',
      sasToken: 'sv=2024-11-04&ss=bfqt&srt=sco&sp=rwdlacupiytfx&se=2028-01-01T18:27:36Z&st=2026-04-04T09:12:36Z&spr=https&sig=rjDd4VzH1nXMrw%2B6jUMUl3xALkh%2BD7D%2FJkgrcJtr4Zc%3D'
    };

    const activityAppUrl = 'https://lynoit.github.io/SkrojaAktivitet.html';
    const pollIntervalMs = 15000;
    const rowsContainer = document.getElementById('rows');
    const pollStatus = document.getElementById('poll-status');

    const nightScreen = document.getElementById('night-screen');
    let pollTimer = null;

    let lastSeenLatestFile = null;
    let hasLoadedOnce = false;

    function buildQrCode() {
      const qrWrap = document.getElementById('qrcode');
      const encodedUrl = encodeURIComponent(activityAppUrl);
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=${encodedUrl}`;
      qrWrap.innerHTML = `<img src="${qrImageUrl}" alt="QR-kod till aktivitetshanteraren" referrerpolicy="no-referrer">`;
    }

    function formatTime(isoString) {
      if (!isoString) return '-';
      return new Date(isoString).toLocaleString('sv-SE', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getBlobBaseUrl() {
      return `https://${azureConfig.accountName}.blob.core.windows.net/${azureConfig.containerName}`;
    }

    async function listJsonBlobs() {
      const { accountName, containerName, sasToken } = azureConfig;
      if (!accountName || !containerName || !sasToken || sasToken.includes('PASTA_IN')) {
        throw new Error('Azure-inställningar saknas. Lägg in en giltig SAS-token i dashboardfilen.');
      }

      const query = sasToken.replace(/^\?/, '');
      const url = `https://${accountName}.blob.core.windows.net/${containerName}?restype=container&comp=list&include=metadata&${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa från Azure (${response.status}).`);

      const xml = await response.text();
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const blobNodes = Array.from(doc.querySelectorAll('Blob'));

      return blobNodes
        .map(blob => {
          const name = blob.querySelector('Name')?.textContent || '';
          const lastModified = blob.querySelector('Properties > Last-Modified')?.textContent || '';
          return { name, lastModified };
        })
        .filter(blob => blob.name.endsWith('.json'));
    }

    async function readJsonRecord(fileName) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const url = `${getBlobBaseUrl()}/${encodeURIComponent(fileName)}?${query}`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Kunde inte läsa ${fileName}`);
      return response.json();
    }

    function isNightMode() {
      const hour = new Date().getHours();
      return hour >= 1 && hour < 6;
    }

    function updateNightMode() {
      const night = isNightMode();
      nightScreen.style.display = night ? 'block' : 'none';
    }

    async function safeLoadActivities() {
      if (isNightMode()) {
        updateNightMode();
        return;
      }

      updateNightMode();

      try {
        await loadActivities();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);

      pollTimer = setInterval(() => {
        safeLoadActivities();
      }, pollIntervalMs);
    }

    async function loadActivities(force = false) {
      if (pollStatus) pollStatus.textContent = '';

      const files = await listJsonBlobs();
      const sortedFiles = files
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name))
        .reverse();

      const latestFile = sortedFiles[0]?.name || null;

      if (!force && hasLoadedOnce && latestFile === lastSeenLatestFile) {
        return;
      }

      lastSeenLatestFile = latestFile;
      hasLoadedOnce = true;

      const recentFiles = sortedFiles.slice(0, 20).map(file => file.name);
      const records = await Promise.all(recentFiles.map(readJsonRecord));

      const cutoff = Date.now() - (14 * 24 * 60 * 60 * 1000);
      const byUser = Object.fromEntries(users.map(user => [user.name, []]));

      records
        .filter(record => record && record.member && record.timestamp)
        .filter(record => {
          const ts = new Date(record.timestamp).getTime();
          return Number.isFinite(ts) && ts >= cutoff;
        })
        .filter(record => !hiddenActivities.includes(record.activity))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
        .forEach(record => {
          if (!byUser[record.member]) return;
          if (record.member === 'Lerverkstan' || byUser[record.member].length < 4) {
            byUser[record.member].push(record);
          }
        });

      renderRows(byUser);
      if (pollStatus) pollStatus.textContent = '';
    }

    function renderRows(byUser) {
      const query = azureConfig.sasToken.replace(/^\?/, '');
      const baseUrl = getBlobBaseUrl();
      rowsContainer.innerHTML = '';

      users.forEach(user => {
        const activities = byUser[user.name] || [];
        if (!activities.length) return;

        const row = document.createElement('section');
        row.className = user.featured ? 'user-row featured-row' : 'user-row';

        const nameTag = document.createElement('div');
        nameTag.className = user.featured ? 'name featured-name' : 'name';
        nameTag.textContent = user.name;

        const lane = document.createElement('div');
        lane.className = user.featured
          ? `lane ${user.laneClass} featured-lane`
          : `lane ${user.laneClass}`;

        const visibleActivities = user.name === 'Lerverkstan'
          ? activities
          : activities.slice(0, 4);

        visibleActivities.forEach(activity => {
          const card = document.createElement('article');
          card.className = 'card';
          const imageHtml = activity.hasImage && activity.imageFileName
            ? `<img class="thumb" src="${baseUrl}/${encodeURIComponent(activity.imageFileName)}?${query}" alt="Bild för ${activity.activity}">`
            : '';
          card.innerHTML = `
            <div class="title2">${activity.activity || 'Okänd aktivitet'}</div>
            <div class="meta">${formatTime(activity.timestamp)}</div>
            ${imageHtml}
          `;
          lane.appendChild(card);
        });

        row.appendChild(nameTag);
        row.appendChild(lane);
        rowsContainer.appendChild(row);
      });
    }

    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        if (pollStatus) pollStatus.textContent = '';
      }
    });

    buildQrCode();
    updateNightMode();

    if (!isNightMode()) {
      safeLoadActivities();
    } else {
      renderRows({});
    }

    startPolling();
  </script>
</body>
</html>
